<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro — Fornecedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#1A5FCC; --primary-soft:#EBF2FF;
    --danger:#EF3E3C; --danger-soft:#FDEAEA;
    --success:#348853; --success-soft:#E6F2EA;
    --amber:#D97706; --amber-soft:#FEF3C7;
    --ink:#232323; --offwhite:#F2EFE4; --white:#FFFFFF;
    --gray:#F5F4F0; --border:#E0DDD5; --muted:#6B7280;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --sans:"DM Sans", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--offwhite);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  .ti{font-size:20px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .ti>svg{width:1em;height:1em;display:block;stroke:currentColor;fill:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:inherit;text-decoration:none}
  .hidden{display:none!important}
  .r{text-align:right}.c{text-align:center}

  .app{display:flex;min-height:100vh;width:100%}
  .sidebar{width:236px;flex:0 0 236px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 0;position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto}
  .brand{padding:0 22px 24px}
  .brand-logo{width:172px;height:auto;display:block;margin-bottom:10px}
  .brand p{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--muted);font-size:13.5px;font-weight:500;transition:background .15s,color .15s}
  .nav-item:hover{background:var(--gray);color:var(--ink)}
  .nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
  .nav-cta{padding:12px 16px 4px}
  .nav-bottom{padding:0 12px;border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:2px}

  .content{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:62px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:40}
  .search{display:flex;align-items:center;gap:8px;background:var(--gray);border:1px solid var(--border);border-radius:999px;padding:8px 16px;width:320px;max-width:34vw}
  .search .ti{color:var(--muted);font-size:18px}
  .search input{border:none;background:none;outline:none;width:100%;font-size:13.5px;color:var(--ink);font-family:var(--sans)}
  .topbar-actions{display:flex;align-items:center;gap:18px}
  .icon-btn{color:var(--muted);position:relative;display:flex;align-items:center;transition:color .15s}
  .icon-btn:hover{color:var(--primary)}
  .icon-btn .dot{position:absolute;top:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid var(--white)}

  .page{padding:24px 28px;max-width:1320px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.02em;padding:9px 16px;border-radius:7px;transition:all .15s;white-space:nowrap}
  .btn .ti{font-size:17px}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1550b0}
  .btn-outline{border:1px solid var(--border);background:var(--white);color:var(--ink)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
  .btn-danger-out{border:1px solid #f3b6b5;background:#fff;color:var(--danger)}.btn-danger-out:hover{background:var(--danger-soft)}
  .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#d8302e}
  .btn-lg{font-size:13px;padding:11px 20px}

  .ph{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .ph h2{font-size:28px;font-weight:700;letter-spacing:-.015em}
  .ph p{color:var(--muted);font-size:14px;margin-top:4px}

  /* Filters */
  .filterbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:space-between}
  .fsearch{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:9px;padding:9px 14px;flex:1;min-width:240px;max-width:420px}
  .fsearch .ti{color:var(--muted);font-size:18px}
  .fsearch input{border:none;background:none;outline:none;width:100%;font-size:13.5px;font-family:var(--sans)}
  .chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .chips .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .chip{font-family:var(--mono);font-size:12px;padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--muted);transition:all .12s}
  .chip:hover{border-color:var(--primary);color:var(--primary)}
  .chip.active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);font-weight:500}

  /* Supplier grid */
  .sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
  .scard{background:#fff;border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:box-shadow .15s,transform .15s;cursor:pointer}
  .scard:hover{box-shadow:0 10px 26px -14px rgba(0,0,0,.32);transform:translateY(-2px)}
  .scard .bar{height:4px}
  .scard .bar.ok{background:var(--success)} .scard .bar.off{background:var(--danger)}
  .scard .body{padding:18px}
  .scard .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .scard .idr{display:flex;gap:13px;align-items:center}
  .savatar{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 46px;color:#fff}
  .savatar.alimentos{background:#348853} .savatar.limpeza{background:#1A5FCC} .savatar.embalagens{background:#D97706}
  .savatar .ti{font-size:24px}
  .scard h3{font-size:16px;font-weight:700}
  .cat-tag{display:inline-block;font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:5px;background:var(--gray);border:1px solid var(--border);color:var(--ink);margin-top:5px}
  .stat-badge{font-family:var(--mono);font-size:11px;font-weight:500;padding:3px 11px;border-radius:999px}
  .stat-badge.ok{background:var(--success-soft);color:var(--success)} .stat-badge.off{background:var(--danger-soft);color:var(--danger)}
  .scard .meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px}
  .scard .meta .k{font-family:var(--mono);font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .scard .meta .v{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px}
  .scard .meta .v .ti{font-size:15px;color:var(--muted)}
  .scard .acts{display:flex;gap:8px}
  .scard .acts .det{flex:1;background:var(--gray);color:var(--primary);font-family:var(--mono);font-size:12px;font-weight:600;padding:9px;border-radius:8px;transition:all .12s}
  .scard .acts .det:hover{background:var(--primary);color:#fff}
  .scard .acts .ed{width:38px;border:1px solid var(--border);border-radius:8px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .scard .acts .ed:hover{border-color:var(--primary);color:var(--primary)}
  .addcard{border:2px dashed var(--border);border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;cursor:pointer;transition:all .15s;color:var(--muted);min-height:230px}
  .addcard:hover{border-color:var(--primary);color:var(--primary);background:#fff}
  .addcard .circ{width:60px;height:60px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:14px;transition:all .15s}
  .addcard:hover .circ{background:var(--primary);color:#fff;border-color:var(--primary)}
  .addcard .circ .ti{font-size:28px}
  .addcard b{font-size:14px;color:var(--ink)}
  .addcard:hover b{color:var(--primary)}
  .addcard span{font-size:12.5px;margin-top:5px}

  /* Detail page */
  .crumb{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .crumb a{cursor:pointer} .crumb a:hover{color:var(--primary);text-decoration:underline}
  .crumb .cur{color:var(--ink)}
  .det-head{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .det-title{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .det-title h2{font-size:24px;font-weight:700}
  .det-actions{display:flex;gap:10px}
  .tabstrip{display:flex;gap:6px;border-bottom:1px solid var(--border)}
  .tabstrip button{padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
  .tabstrip button:hover{color:var(--ink)}
  .tabstrip button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
  .det-cols{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
  @media (max-width:1000px){.det-cols{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px}
  .card-h{padding:13px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .card-b{padding:16px}
  .info-row{display:flex;gap:11px;align-items:flex-start;padding:8px 0}
  .info-row .ti{color:var(--primary);font-size:18px;margin-top:1px}
  .info-row .k{font-family:var(--mono);font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
  .info-row .v{font-size:13.5px;font-weight:500;margin-top:1px}
  .mapbox{height:120px;border-radius:8px;margin-top:12px;background:
    linear-gradient(0deg,transparent 23px,#e3e0d7 24px),
    linear-gradient(90deg,transparent 23px,#e3e0d7 24px);
    background-size:24px 24px;background-color:#f0eee6;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--primary);position:relative}
  .mapbox .ti{font-size:26px}
  .ministat{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1px solid var(--border)}
  .ministat:first-child{border-top:none}
  .ministat .k{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .ministat .v{font-weight:700;font-size:15px}
  .ministat .ti{color:var(--muted)}

  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--gray)}
  thead th.r{text-align:right}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--gray)}
  .pname{font-weight:600}
  .ptag{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .mono{font-family:var(--mono)}
  .trend{font-family:var(--mono);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .trend.up{color:var(--danger)} .trend.down{color:var(--success)} .trend.flat{color:var(--muted)}
  .trend .ti{font-size:15px}
  .ordid{font-family:var(--mono);font-size:12.5px;color:var(--primary);font-weight:600}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px}
  .pill .pd{width:7px;height:7px;border-radius:50%}
  .pill.ok{background:var(--success-soft);color:var(--success)} .pill.ok .pd{background:var(--success)}
  .pill.trans{background:var(--primary-soft);color:var(--primary)} .pill.trans .pd{background:var(--primary)}
  .pill.canc{background:var(--danger-soft);color:var(--danger)} .pill.canc .pd{background:var(--danger)}
  .eye{width:30px;height:30px;border-radius:7px;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;transition:all .12s}
  .eye:hover{color:var(--primary);background:var(--primary-soft)}
  .tbl-foot{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .createorder{padding:16px;border-top:1px solid var(--border);display:flex;justify-content:center}

  /* Modal + toasts */
  .overlay{position:absolute;inset:0;background:rgba(35,35,35,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fade .15s ease}
  .modal{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:24px;box-shadow:0 24px 60px -20px rgba(0,0,0,.4);animation:pop .18s ease}
  .modal .mi{width:52px;height:52px;border-radius:50%;background:var(--danger-soft);color:var(--danger);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .modal .mi .ti{font-size:26px}
  .modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
  .modal p{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:22px}
  .modal p b{color:var(--ink)}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end}
  .toasts{position:absolute;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:80}
  .toast{background:#fff;border:1px solid var(--border);border-left:4px solid var(--success);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:11px;box-shadow:0 12px 30px -12px rgba(0,0,0,.25);min-width:260px;max-width:360px;animation:slidein .22s ease}
  .toast.info{border-left-color:var(--primary)} .toast.warn{border-left-color:var(--amber)}
  .toast .ti{font-size:20px} .toast.success .ti{color:var(--success)} .toast.info .ti{color:var(--primary)} .toast.warn .ti{color:var(--amber)}
  .toast .t-txt{font-size:13.5px;font-weight:500;line-height:1.35}
  .toast.leaving{animation:slideout .2s ease forwards}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1)}}
  @keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideout{to{opacity:0;transform:translateX(20px)}}
  @media (max-width:880px){.sidebar{display:none}.search{display:none}}
</style>
</head>

  function hydrateIcons(root){
    var list=(root||document).querySelectorAll('i.ti');
    Array.prototype.forEach.call(list,function(el){
      if(el.getAttribute('data-hi')) return;
      var name=null, cls=(el.className||'').split(/\s+/);
      for(var i=0;i<cls.length;i++){ if(cls[i]!=='ti' && cls[i].indexOf('ti-')===0){ name=cls[i].slice(3); break; } }
      if(name && ICONS[name]) el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
      el.setAttribute('data-hi','1');
    });
  }
  function toast(msg,type){
    type=type||"info";
    var ico=type==="success"?"circle-check":type==="warn"?"alert-triangle":"info-circle";
    var el=document.createElement("div"); el.className="toast "+type;
    el.innerHTML='<i class="ti ti-'+ico+'"></i><span class="t-txt">'+msg+'</span>';
    $("#toasts").appendChild(el); hydrateIcons(el);
    setTimeout(function(){ el.classList.add("leaving"); setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },200); },2600);
  }

  /* ---------- Data ---------- */

       address:"Rua Santa Helena, 1234 — Distrito Industrial, Ribeirão Preto - SP, CEP 14095-000",
       pedidos:12, taxa:"98%",

  function render(){
    if(state.view==="list") renderList(); else renderDetail();

  /* ---------- List ---------- */
  function renderList(){
    var cats=["Todos","Alimentos","Limpeza","Embalagens"];
    var chips=cats.map(function(c){ return '<button class="chip '+(state.filter===c?'active':'')+'" data-cat="'+c+'">'+c+'</button>'; }).join("");
    var data=suppliers.filter(function(s){
      if(state.filter!=="Todos" && s.cat!==state.filter) return false;
      if(state.search && (s.name+s.cat).toLowerCase().indexOf(state.search.toLowerCase())===-1) return false;
      return true;
    });
    var cards=data.map(function(s){
      var idx=suppliers.indexOf(s);
      var on=s.status==="Ativo";
      return '<div class="scard" data-open="'+idx+'">'+
        '<div class="bar '+(on?'ok':'off')+'"></div><div class="body">'+
          '<div class="top"><div class="idr"><div class="savatar '+s.cat.toLowerCase()+'"><i class="ti ti-building-store"></i></div>'+
            '<div><h3>'+s.name+'</h3><span class="cat-tag">'+s.cat+'</span></div></div>'+
            '<span class="stat-badge '+(on?'ok':'off')+'">'+s.status+'</span></div>'+
          '<div class="meta"><div><div class="k">Lead time médio</div><div class="v"><i class="ti ti-clock"></i>'+s.lead+'</div></div>'+

          '<div class="acts"><button class="det" data-open="'+idx+'">Ver detalhes</button>'+

        '</div></div>';

      '<div class="ph"><div><h2>Gestão de Fornecedores</h2><p>Visualize e gerencie sua rede de suprimentos.</p></div>'+
        '<button class="btn btn-primary" id="newsup"><i class="ti ti-plus"></i>Novo Fornecedor</button></div>'+
      '<div class="filterbar"><div class="fsearch"><i class="ti ti-search"></i><input id="fsearch" type="text" placeholder="Buscar fornecedor por nome ou CNPJ..." value="'+state.search+'"></div>'+
        '<div class="chips"><span class="lab">Categorias</span>'+chips+'</div></div>'+
      '<div class="sgrid">'+cards+'</div>';

    $("#newsup").onclick=function(){ toast("Abrindo o cadastro de novo fornecedor...", "info"); };
    $("#addnew").onclick=function(){ toast("Abrindo o cadastro de novo fornecedor...", "info"); };
    var fs=$("#fsearch"); fs.addEventListener("input", function(){ state.search=fs.value; renderList(); hydrateIcons(document); var n=$("#fsearch"); n.focus(); n.setSelectionRange(n.value.length,n.value.length); });
    document.querySelectorAll(".chip").forEach(function(c){ c.onclick=function(){ state.filter=c.getAttribute("data-cat"); render(); }; });
    document.querySelectorAll("[data-open]").forEach(function(el){ el.addEventListener("click", function(e){ e.stopPropagation(); state.sel=+el.getAttribute("data-open"); state.view="detail"; window.scrollTo(0,0); render(); }); });
    document.querySelectorAll("[data-edit]").forEach(function(el){ el.addEventListener("click", function(e){ e.stopPropagation(); toast("Editando "+suppliers[+el.getAttribute("data-edit")].name+"...", "info"); }); });

  /* ---------- Detail ---------- */
  function trendCell(t){
    if(t===0) return '<span class="trend flat">— 0.0%</span>';
    if(t>0) return '<span class="trend up"><i class="ti ti-trending-up"></i>'+t.toFixed(1)+'%</span>';
    return '<span class="trend down"><i class="ti ti-trending-down"></i>'+Math.abs(t).toFixed(1)+'%</span>';
  }
  function renderDetail(){
    var s=suppliers[state.sel];
    var prods=s.products.map(function(p){
      return '<tr><td><span class="pname">'+p[0]+'</span></td><td class="ptag">'+p[1]+'</td><td class="mono">'+p[2]+'</td><td class="mono">'+p[3]+'</td><td>'+trendCell(p[4])+'</td></tr>';
    }).join("");
    var hist=s.history.map(function(h){
      return '<tr><td><span class="ordid">'+h[0]+'</span></td><td>'+h[1]+'</td><td>'+h[2]+'</td><td class="mono">'+h[3]+'</td>'+
        '<td><span class="pill '+h[4]+'"><span class="pd"></span>'+STLABEL[h[4]]+'</span></td>'+
        '<td class="r"><button class="eye" data-eye="'+h[0]+'"><i class="ti ti-eye"></i></button></td></tr>';
    }).join("");

    $("#page").innerHTML =
      '<div class="crumb"><a id="bc-list">Fornecedores</a><i class="ti ti-chevron-right" style="font-size:13px"></i><span class="cur">'+s.name+'</span></div>'+

        '<span class="pill '+(s.status==="Ativo"?'ok':'canc')+'"><span class="pd"></span>'+s.status+'</span>'+
        '<span class="cat-tag" style="margin-top:0">'+s.cat+'</span></div>'+
        '<div class="det-actions"><button class="btn btn-outline" id="d-edit"><i class="ti ti-pencil"></i>Editar</button>'+
        '<button class="btn btn-danger-out" id="d-del"><i class="ti ti-trash"></i>Excluir</button></div></div>'+
      '<div class="tabstrip"><button data-tab="Visão Geral">Visão Geral</button><button class="active">Detalhes</button><button data-tab="Documentos">Documentos</button></div>'+
      '<div class="det-cols"><div style="display:flex;flex-direction:column;gap:18px">'+
        '<div class="card"><div class="card-h">Informações de Contato</div><div class="card-b">'+
          '<div class="info-row"><i class="ti ti-phone"></i><div><div class="k">Telefone</div><div class="v">'+s.phone+'</div></div></div>'+
          '<div class="info-row"><i class="ti ti-mail"></i><div><div class="k">E-mail</div><div class="v">'+s.email+'</div></div></div>'+
          '<div class="info-row"><i class="ti ti-receipt"></i><div><div class="k">CNPJ</div><div class="v">'+s.cnpj+'</div></div></div>'+
        '</div></div>'+
        '<div class="card"><div class="card-h">Endereço Fiscal</div><div class="card-b">'+
          '<div style="display:flex;gap:11px"><i class="ti ti-map-pin" style="color:var(--primary);font-size:18px;margin-top:1px"></i>'+
          '<div class="v" style="font-size:13.5px;line-height:1.5">'+s.address+'</div></div>'+
          '<div class="mapbox"><i class="ti ti-map-pin"></i></div>'+
        '</div></div>'+
        '<div class="card">'+
          '<div class="ministat"><span class="k">Lead time médio</span><span class="v">'+s.lead+' <i class="ti ti-clock" style="font-size:15px"></i></span></div>'+
          '<div class="ministat"><span class="k">Pedidos realizados</span><span class="v">'+s.pedidos+' <i class="ti ti-receipt" style="font-size:15px"></i></span></div>'+
          '<div class="ministat"><span class="k">Taxa de entrega</span><span class="v" style="color:var(--success)">'+s.taxa+' <i class="ti ti-circle-check" style="font-size:15px"></i></span></div>'+
        '</div>'+
      '</div><div style="display:flex;flex-direction:column;gap:18px">'+
        '<div class="card"><div class="card-h">Produtos Fornecidos <span class="link" id="ver-estoque" style="color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:4px">Ver estoque completo <i class="ti ti-arrow-up-right" style="font-size:14px"></i></span></div>'+

          '<div class="createorder"><button class="btn btn-primary" id="d-order"><i class="ti ti-shopping-cart"></i>Criar novo pedido de compra</button></div>'+

          '<table><thead><tr><th>ID do pedido</th><th>Data</th><th>Itens</th><th>Valor total</th><th>Status</th><th class="r">Ações</th></tr></thead><tbody>'+hist+'</tbody></table>'+
          '<div class="tbl-foot"><span>Exibindo '+s.history.length+' de '+s.histTotal+' pedidos</span><span style="display:flex;gap:6px"><button class="eye" id="pg-prev"><i class="ti ti-chevron-left"></i></button><button class="eye" id="pg-next"><i class="ti ti-chevron-right"></i></button></span></div>'+
        '</div>'+
      '</div></div>';

    $("#bc-list").onclick=function(){ state.view="list"; window.scrollTo(0,0); render(); };
    $("#d-edit").onclick=function(){ toast("Editando "+s.name+"...", "info"); };
    $("#d-del").onclick=function(){ confirmDelete(state.sel); };
    $("#d-order").onclick=function(){ window.location.href="pedidos.html"; };
    $("#ver-estoque").onclick=function(){ window.location.href="estoque.html"; };

  function confirmDelete(idx){
    var s=suppliers[idx];
    $("#modal-root").innerHTML='<div class="overlay" id="ovl"><div class="modal"><div class="mi"><i class="ti ti-trash"></i></div>'+
      '<h3>Remover fornecedor?</h3><p>Tem certeza que deseja remover <b>'+s.name+'</b> da sua rede? Esta ação não pode ser desfeita.</p>'+
      '<div class="modal-foot"><button class="btn btn-outline" id="m-cancel">Cancelar</button><button class="btn btn-danger" id="m-ok"><i class="ti ti-trash"></i>Remover</button></div></div></div>';
    hydrateIcons($("#modal-root"));
    var close=function(){ $("#modal-root").innerHTML=""; };
    $("#m-cancel").onclick=close;
    $("#ovl").onclick=function(e){ if(e.target.id==="ovl") close(); };
    $("#m-ok").onclick=function(){ suppliers.splice(idx,1); close(); state.view="list"; window.scrollTo(0,0); render(); toast(s.name+" removido da sua rede.", "warn"); };
  }

  document.addEventListener("click", function(e){
    var go=e.target.closest && e.target.closest("[data-href]");
    if(go){ window.location.href=go.getAttribute("data-href"); return; }
    var nav=e.target.closest && e.target.closest("[data-nav]");
    if(nav){ toast('"'+nav.getAttribute("data-nav")+'" faz parte de outro fluxo do protótipo.', "info"); }
  });

  initData(); render();
})();
