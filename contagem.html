<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro — Contagem de Estoque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#1A5FCC; --primary-soft:#EBF2FF;
    --danger:#EF3E3C; --danger-soft:#FDEAEA;
    --success:#348853; --success-soft:#E6F2EA;
    --amber:#D97706; --amber-soft:#FEF3C7; --amber-border:#FCD34D;
    --ink:#232323; --offwhite:#F2EFE4; --white:#FFFFFF;
    --gray:#F5F4F0; --border:#E0DDD5; --muted:#6B7280;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --sans:"DM Sans", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--offwhite);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  .ti{font-size:20px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .ti>svg{width:1em;height:1em;display:block;stroke:currentColor;fill:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:inherit;text-decoration:none}
  .hidden{display:none!important}
  .r{text-align:right}.c{text-align:center}

  .app{display:flex;min-height:100vh;width:100%}
  .sidebar{width:236px;flex:0 0 236px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 0;position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto}
  .brand{padding:0 22px 24px}
  .brand-logo{width:172px;height:auto;display:block;margin-bottom:10px}
  .brand p{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--muted);font-size:13.5px;font-weight:500;transition:background .15s,color .15s}
  .nav-item:hover{background:var(--gray);color:var(--ink)}
  .nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
  .nav-cta{padding:12px 16px 4px}
  .nav-bottom{padding:0 12px;border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:2px}

  .content{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:62px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:40}
  .search{display:flex;align-items:center;gap:8px;background:var(--gray);border:1px solid var(--border);border-radius:999px;padding:8px 16px;width:320px;max-width:34vw}
  .search .ti{color:var(--muted);font-size:18px}
  .search input{border:none;background:none;outline:none;width:100%;font-size:13.5px;color:var(--ink);font-family:var(--sans)}
  .topbar-actions{display:flex;align-items:center;gap:18px}
  .icon-btn{color:var(--muted);position:relative;display:flex;align-items:center;transition:color .15s}
  .icon-btn:hover{color:var(--primary)}
  .icon-btn .dot{position:absolute;top:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid var(--white)}

  .page{padding:24px 28px;max-width:1320px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.02em;padding:9px 16px;border-radius:7px;transition:all .15s;white-space:nowrap}
  .btn .ti{font-size:17px}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1550b0}
  .btn-outline{border:1px solid var(--border);background:var(--white);color:var(--ink)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
  .btn-green{background:var(--success);color:#fff}.btn-green:hover{background:#2c7146}
  .btn-lg{font-size:13px;padding:11px 20px}

  /* Page header */
  .ph{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .ph .sync{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}
  .ph .sync .gdot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 0 3px var(--success-soft)}
  .ph h2{font-size:26px;font-weight:700;letter-spacing:-.015em}
  .ph-actions{display:flex;gap:10px;flex-wrap:wrap}

  .cols{display:grid;grid-template-columns:1fr 312px;gap:18px;align-items:start}
  @media (max-width:1040px){.cols{grid-template-columns:1fr}}
  .colmain{display:flex;flex-direction:column;gap:14px}

  /* Sector tabs */
  .tabs{background:#fff;border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;gap:6px;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:7px;color:var(--muted);font-family:var(--mono);font-size:12px;font-weight:500;white-space:nowrap;transition:all .12s}
  .tab .ti{font-size:17px}
  .tab:hover{background:var(--gray);color:var(--ink)}
  .tab.active{background:var(--primary-soft);color:var(--primary)}

  /* Paused banner */
  .pausebar{background:var(--amber-soft);border:1.5px solid var(--amber-border);border-radius:9px;padding:12px 16px;display:flex;align-items:center;gap:11px;color:#92400E;font-weight:600;font-size:13.5px}
  .pausebar .ti{color:var(--amber);font-size:20px}

  /* Count table */
  .ctable{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:opacity .2s}
  .ctable.dim{opacity:.55;pointer-events:none}
  .chead,.crow{display:grid;grid-template-columns:1fr 110px 250px;gap:12px;align-items:center;padding:14px 18px}
  .chead{background:var(--gray);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .crow{border-bottom:1px solid var(--border);transition:background .12s}
  .crow:last-child{border-bottom:none}
  .crow:hover{background:var(--gray)}
  .crow.diverg{background:#FFF5F5}
  .cname{font-size:16px;font-weight:600}
  .cdesc{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
  .cexp{font-family:var(--mono);font-size:14px;color:var(--muted);text-align:center}
  .cright{display:flex;align-items:center;justify-content:center;gap:10px}
  .stepper{display:flex;align-items:center;gap:6px;background:var(--gray);border:1px solid var(--border);border-radius:9px;padding:4px}
  .stepper.err{border-color:var(--danger)}
  .stepper button{width:36px;height:36px;border-radius:6px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink);transition:all .12s}
  .stepper button:hover{border-color:var(--primary);color:var(--primary)}
  .stepper input{width:54px;height:36px;border:none;background:transparent;text-align:center;font-family:var(--mono);font-weight:700;font-size:15px;outline:none;color:var(--ink)}
  .stepper.err input{color:var(--danger)}
  .statico{width:24px;display:flex;justify-content:center}
  .statico .ti{font-size:20px}
  .statico .ok{color:var(--success)} .statico .warn{color:var(--danger)}
  .cph{padding:48px 24px;text-align:center;color:var(--muted)}
  .cph .ti{font-size:38px;color:var(--border);margin-bottom:10px}

  /* Progress sidebar */
  .pcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;transition:opacity .2s}
  .pcard.dim{opacity:.55;pointer-events:none}
  .pcard h3{font-size:17px;font-weight:700;margin-bottom:14px}
  .pct{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px}
  .pct .big{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--primary);line-height:1}
  .pct .sub{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .pbar{height:10px;background:var(--gray);border-radius:999px;overflow:hidden;margin-bottom:14px}
  .pbar i{display:block;height:100%;background:var(--primary);border-radius:999px}
  .prow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
  .prow .lab{font-family:var(--mono);font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .prow .lab .d{width:8px;height:8px;border-radius:50%}
  .prow .v{font-family:var(--mono);font-weight:600}
  .scanner{background:var(--gray);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
  .scanner .ti{font-size:30px;color:var(--muted)}
  .scanner .t{font-family:var(--mono);font-size:12.5px;font-weight:500;margin-top:4px}
  .scanner .s{font-size:12px;color:var(--muted);line-height:1.4}
  .scanner .lk{color:var(--primary);font-family:var(--mono);font-size:11.5px;margin-top:6px;cursor:pointer}
  .scanner .lk:hover{text-decoration:underline}

  /* Report */
  .rep-head{display:flex;flex-direction:column;gap:8px}
  .rep-head h2{font-size:26px;font-weight:700;letter-spacing:-.015em}
  .rep-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .rep-meta .chip{display:inline-flex;align-items:center;gap:6px;background:var(--gray);border:1px solid var(--border);border-radius:6px;padding:4px 9px}
  .rep-meta .id{background:var(--primary-soft);border-color:#cfe0fb;color:var(--primary)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media (max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
  .stat .topc{position:absolute;top:0;left:0;right:0;height:3px}
  .stat .lab{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
  .stat .lab .ti{font-size:15px}
  .stat .num{font-size:32px;font-weight:700;margin-top:10px;line-height:1}
  .stat .den{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:4px;font-weight:400}
  .stat.red .topc{background:var(--danger)} .stat.red .num,.stat.red .lab .ti{color:var(--danger)}
  .stat.amber .topc{background:var(--amber)} .stat.amber .num,.stat.amber .lab .ti{color:var(--amber)}
  .stat.blue .topc{background:var(--primary)} .stat.blue .num,.stat.blue .lab .ti{color:var(--primary)}
  .stat.dark .num{color:var(--ink)}

  .sec-title{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;margin-top:4px}
  .sec-title .badge{font-family:var(--mono);font-size:10.5px;font-weight:500;background:var(--danger-soft);color:var(--danger);padding:3px 9px;border-radius:999px}
  .disc{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media (max-width:900px){.disc{grid-template-columns:1fr}}
  .dcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;border-left:3px solid var(--danger)}
  .dcard .top{display:flex;justify-content:space-between;align-items:flex-start}
  .dcard .code{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .dcard h4{font-size:15px;font-weight:700;margin-top:3px}
  .dcard .vals{display:flex;justify-content:space-between;margin-top:14px;gap:10px}
  .dcard .vbox .k{font-family:var(--mono);font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
  .dcard .vbox .v{font-family:var(--mono);font-size:16px;font-weight:700;margin-top:2px}
  .dcard .vbox.cont .v{color:var(--danger)}
  .dcard .trend{color:var(--danger)} .dcard .trend.up{color:var(--amber)}
  .dcard.up{border-left-color:var(--amber)}
  .dcard.up .vbox.cont .v{color:var(--amber)}

  .rtable{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .rtable .rth,.rtable .rtr{display:grid;grid-template-columns:1fr 2fr 1fr 1fr 1fr 1.1fr;gap:10px;align-items:center;padding:13px 18px}
  .rtable .rth{background:var(--gray);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .rtable .rtr{border-bottom:1px solid var(--border)}
  .rtable .rtr:last-child{border-bottom:none}
  .rtable .rtr:hover{background:var(--gray)}
  .rcode{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .rname{font-weight:600;font-size:14px}
  .rnum{font-family:var(--mono);font-size:13px;text-align:center}
  .rdiff{font-family:var(--mono);font-size:13px;font-weight:700;text-align:center}
  .rdiff.neg{color:var(--danger)} .rdiff.pos{color:var(--amber)} .rdiff.zero{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px}
  .pill .pd{width:7px;height:7px;border-radius:50%}
  .pill.crit{background:var(--danger-soft);color:var(--danger)} .pill.crit .pd{background:var(--danger)}
  .pill.ok{background:var(--primary-soft);color:var(--primary)} .pill.ok .pd{background:var(--primary)}
  .pill.over{background:var(--amber-soft);color:var(--amber)} .pill.over .pd{background:var(--amber)}

  .rep-foot{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px}
  .rep-foot .note{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted)}
  .rep-foot .note .ti{color:var(--amber);font-size:18px}

  /* Success */
  .success{display:flex;align-items:center;justify-content:center;padding:48px 24px;min-height:460px}
  .success-inner{max-width:560px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;animation:fadeup .45s ease}
  .success-ico{width:90px;height:90px;border-radius:50%;background:var(--success-soft);display:flex;align-items:center;justify-content:center;margin-bottom:22px}
  .success-ico .ti{font-size:48px;color:var(--success)}
  .success h2{font-size:28px;font-weight:700;margin-bottom:10px;letter-spacing:-.01em}
  .success .lead{color:var(--muted);font-size:15px;max-width:440px;margin-bottom:28px;line-height:1.55}
  .acards{width:100%;display:flex;flex-direction:column;gap:12px}
  .acard{display:flex;align-items:center;gap:14px;text-align:left;background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:all .15s}
  .acard:hover{border-color:var(--primary);box-shadow:0 6px 18px -10px rgba(26,95,204,.5);transform:translateY(-1px)}
  .acard .ai{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 46px}
  .acard.p .ai{background:var(--primary-soft);color:var(--primary)}
  .acard.n .ai{background:var(--gray);color:var(--ink)}
  .acard .at{flex:1}
  .acard .at h4{font-size:15px;font-weight:700}
  .acard .at p{font-size:12.5px;color:var(--muted);margin-top:2px}
  .acard .chev{color:var(--muted)}
  .acard:hover .chev{color:var(--primary)}

  /* Toasts */
  .toasts{position:absolute;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:80}
  .toast{background:#fff;border:1px solid var(--border);border-left:4px solid var(--success);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:11px;box-shadow:0 12px 30px -12px rgba(0,0,0,.25);min-width:260px;max-width:360px;animation:slidein .22s ease}
  .toast.info{border-left-color:var(--primary)} .toast.warn{border-left-color:var(--amber)}
  .toast .ti{font-size:20px}
  .toast.success .ti{color:var(--success)} .toast.info .ti{color:var(--primary)} .toast.warn .ti{color:var(--amber)}
  .toast .t-txt{font-size:13.5px;font-weight:500;line-height:1.35}
  .toast.leaving{animation:slideout .2s ease forwards}

  @keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideout{to{opacity:0;transform:translateX(20px)}}
  @keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  @media (max-width:880px){.sidebar{display:none}.search{display:none}.chead{display:none}.crow{grid-template-columns:1fr}}
</style>
</head>

    "report-analytics":'<path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"/><path d="M9 3m0 2a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2z"/><path d="M9 17v-2"/><path d="M12 17v-4"/><path d="M15 17v-6"/>',
    "settings":'<path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z"/><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"/>',
    "help-circle":'<path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/><path d="M12 17l0 .01"/><path d="M12 13.5a1.5 1.5 0 0 1 1 -1.5a2.6 2.6 0 1 0 -3 -4"/>',
    "plus":'<path d="M12 5l0 14"/><path d="M5 12l14 0"/>',
    "minus":'<path d="M5 12l14 0"/>',
    "search":'<path d="M3 10a7 7 0 1 0 14 0a7 7 0 0 0 -14 0"/><path d="M21 21l-6 -6"/>',
    "bell":'<path d="M10 5a2 2 0 1 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3h-16a4 4 0 0 0 2 -3v-3a7 7 0 0 1 4 -6"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/>',
    "user-circle":'<path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/><path d="M9 10a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"/><path d="M6.168 18.849a4 4 0 0 1 3.832 -2.849h4a4 4 0 0 1 3.834 2.855"/>',
    "box":'<path d="M12 3l8 4.5v9l-8 4.5l-8 -4.5v-9l8 -4.5"/><path d="M12 12l8 -4.5"/><path d="M12 12v9"/><path d="M12 12l-8 -4.5"/>',
    "snowflake":'<path d="M12 3v18"/><path d="M3 12h18"/><path d="M6.3 6.3l11.4 11.4"/><path d="M6.3 17.7l11.4 -11.4"/>',
    "cup":'<path d="M4 5h16l-1.5 13a2 2 0 0 1 -2 1.8h-9a2 2 0 0 1 -2 -1.8z"/><path d="M5.5 9.5h13"/>',
    "building-warehouse":'<path d="M3 21v-13l9 -4l9 4v13"/><path d="M13 13h4v8h-10v-6h6"/><path d="M13 21v-9a1 1 0 0 0 -1 -1h-2a1 1 0 0 0 -1 1v3"/>',
    "circle-check":'<path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/><path d="M9 12l2 2l4 -4"/>',
    "alert-triangle":'<path d="M12 9v4"/><path d="M10.363 3.591l-8.106 13.534a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636 -2.87l-8.106 -13.536a1.914 1.914 0 0 0 -3.274 0z"/><path d="M12 16h.01"/>',
    "qr-code":'<path d="M4 4m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z"/><path d="M7 17l0 .01"/><path d="M14 4m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z"/><path d="M4 14m0 1a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1z"/><path d="M14 14l3 0"/><path d="M20 14l0 3"/><path d="M14 14l0 3"/><path d="M14 20l3 0"/><path d="M17 17l3 0"/><path d="M20 17l0 3"/>',
    "player-pause":'<path d="M6 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"/><path d="M14 5m0 1a1 1 0 0 1 1 -1h2a1 1 0 0 1 1 1v12a1 1 0 0 1 -1 1h-2a1 1 0 0 1 -1 -1z"/>',
    "player-play":'<path d="M7 4v16l13 -8z"/>',
    "calendar":'<path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/><path d="M11 15h1"/><path d="M12 15v3"/>',
    "hash":'<path d="M5 9l14 0"/><path d="M5 15l14 0"/><path d="M11 4l-4 16"/><path d="M17 4l-4 16"/>',
    "trending-up":'<path d="M3 17l6 -6l4 4l8 -8"/><path d="M14 7l7 0l0 7"/>',
    "trending-down":'<path d="M3 7l6 6l4 -4l8 8"/><path d="M14 17l7 0l0 -7"/>',
    "arrow-left":'<path d="M5 12l14 0"/><path d="M5 12l6 6"/><path d="M5 12l6 -6"/>',
    "refresh":'<path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/>',
    "info-circle":'<path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/><path d="M12 9h.01"/><path d="M11 12h1v4h1"/>',
    "shopping-cart-check":'<path d="M11.5 17h-5.5v-14h-2"/><path d="M6 5l14 1l-1 7h-13"/><path d="M6 19m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M15 19l2 2l4 -4"/>',
    "home":'<path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/>',
    "chevron-right":'<path d="M9 6l6 6l-6 6"/>'
  };
  function hydrateIcons(root){
    var list=(root||document).querySelectorAll('i.ti');
    Array.prototype.forEach.call(list,function(el){
      if(el.getAttribute('data-hi')) return;
      var name=null, cls=(el.className||'').split(/\s+/);
      for(var i=0;i<cls.length;i++){ if(cls[i]!=='ti' && cls[i].indexOf('ti-')===0){ name=cls[i].slice(3); break; } }
      if(name && ICONS[name]) el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
      el.setAttribute('data-hi','1');
    });
  }
  function toast(msg,type){
    type=type||"info";
    var ico=type==="success"?"circle-check":type==="warn"?"alert-triangle":"info-circle";
    var el=document.createElement("div"); el.className="toast "+type;
    el.innerHTML='<i class="ti ti-'+ico+'"></i><span class="t-txt">'+msg+'</span>';
    $("#toasts").appendChild(el); hydrateIcons(el);
    setTimeout(function(){ el.classList.add("leaving"); setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },200); },2600);
  }

  /* ---------- Data ---------- */
  var SECTORS=[["Despensa","box"],["Câmara Fria","snowflake"],["Balcão","cup"],["Estoque","building-warehouse"]];
  var state={};
  function initData(){
    state={ screen:"active", paused:false, sector:0,
      rows:[
        {name:"Açúcar Refinado", desc:"Pacote 1kg · Fornecedor: DoceVida", esperado:45, contagem:45},
        {name:"Leite Integral", desc:"Caixa 1L · Fornecedor: Laticínios Vale", esperado:120, contagem:98},
        {name:"Café em Grãos", desc:"Pacote 500g · Fornecedor: Aroma Café", esperado:30, contagem:null}
      ]
    };
  }
  var REPORT={
    date:"24 de outubro, 2023 · 14:30", id:"RCT-8842",
    stats:[
      {cls:"dark", ti:null, lab:"Total contados", num:"142", den:"/ 150"},
      {cls:"red", ti:"alert-triangle", lab:"Níveis críticos", num:"12", den:"itens"},
      {cls:"amber", ti:"player-pause", lab:"Em atenção", num:"28", den:"itens"},
      {cls:"blue", ti:"circle-check", lab:"Níveis normais", num:"102", den:"itens"}
    ],
    disc:[
      {id:"INV-092", name:"Farinha de Trigo 5kg", cont:"2 unid.", esp:"15 unid.", up:false},
      {id:"INV-115", name:"Óleo de Soja 900ml", cont:"4 un.", esp:"24 un.", up:false},
      {id:"INV-044", name:"Café em Grão 1kg", cont:"32 un.", esp:"20 un.", up:true}
    ],
    table:[
      {code:"INV-092", name:"Farinha de Trigo 5kg", sis:15, cont:2, status:"crit"},
      {code:"INV-103", name:"Açúcar Refinado 1kg", sis:50, cont:50, status:"ok"},
      {code:"INV-044", name:"Café em Grão 1kg", sis:20, cont:32, status:"over"},
      {code:"INV-210", name:"Leite Integral 1L", sis:120, cont:118, status:"ok"}
    ]
  };
  var STLABEL={crit:"Crítico", ok:"Conferido", over:"Sobrando"};

  /* ---------- Router ---------- */
  function render(){
    if(state.screen==="active") renderActive();
    else if(state.screen==="report") renderReport();
    else renderSuccess();
    hydrateIcons(document);
  }

  /* ---------- Active / paused ---------- */
  function statusOf(r){ if(r.contagem===null||r.contagem==="") return "none"; return r.contagem===r.esperado?"ok":"diverg"; }

  function renderActive(){
    var tabs=SECTORS.map(function(s,i){
      return '<button class="tab '+(i===state.sector?'active':'')+'" data-sec="'+i+'"><i class="ti ti-'+s[1]+'"></i>'+s[0]+'</button>';
    }).join("");

    var tableInner;
    if(state.sector===0){
      var rows=state.rows.map(function(r,i){
        var st=statusOf(r);
        var ico = st==="ok"?'<i class="ti ti-circle-check ok"></i>': st==="diverg"?'<i class="ti ti-alert-triangle warn"></i>':'';
        return '<div class="crow '+(st==="diverg"?'diverg':'')+'">'+
          '<div><div class="cname">'+r.name+'</div><div class="cdesc">'+r.desc+'</div></div>'+
          '<div class="cexp">'+r.esperado+'</div>'+
          '<div class="cright"><div class="stepper '+(st==="diverg"?'err':'')+'">'+
            '<button data-i="'+i+'" data-d="-1"><i class="ti ti-minus"></i></button>'+
            '<input type="text" inputmode="numeric" data-i="'+i+'" value="'+(r.contagem===null?'':r.contagem)+'" placeholder="--">'+
            '<button data-i="'+i+'" data-d="1"><i class="ti ti-plus"></i></button>'+
          '</div><div class="statico">'+ico+'</div></div>'+
        '</div>';
      }).join("");
      tableInner='<div class="chead"><div>Item</div><div class="c">Esperado</div><div class="c">Contagem atual</div></div>'+rows;
    } else {
      tableInner='<div class="chead"><div>Item</div><div class="c">Esperado</div><div class="c">Contagem atual</div></div>'+
        '<div class="cph"><i class="ti ti-box"></i><div>Nenhum item carregado para <b>'+SECTORS[state.sector][0]+'</b> ainda.</div></div>';
    }

    var dim = state.paused ? 'dim' : '';
    var pauseBanner = state.paused ? '<div class="pausebar"><i class="ti ti-player-pause"></i>Contagem pausada. O progresso atual (66%) foi salvo.</div>' : '';
    var leftBtn = state.paused
      ? '<button class="btn btn-green" id="toggle-pause"><i class="ti ti-player-play"></i>Retomar contagem</button>'
      : '<button class="btn btn-outline" id="toggle-pause"><i class="ti ti-player-pause"></i>Pausar contagem</button>';

    $("#page").innerHTML =
      '<div class="ph"><div>'+
        '<div class="sync"><span class="gdot"></span>Contagem em andamento · última sincronização há 2 min</div>'+
        '<h2>Contagem de Estoque</h2>'+
      '</div><div class="ph-actions">'+leftBtn+
        '<button class="btn btn-primary" id="go-report">Revisar e finalizar</button>'+
      '</div></div>'+
      '<div class="cols"><div class="colmain">'+
        '<div class="tabs">'+tabs+'</div>'+
        pauseBanner+
        '<div class="ctable '+dim+'">'+tableInner+'</div>'+
      '</div><div class="colside">'+
        '<div class="pcard '+dim+'"><h3>Progresso da Despensa</h3>'+
          '<div class="pct"><span class="big">66%</span><span class="sub">32 / 48 itens</span></div>'+
          '<div class="pbar"><i style="width:66%"></i></div>'+
          '<div class="prow"><span class="lab"><span class="d" style="background:var(--success)"></span>Corretos</span><span class="v">28</span></div>'+
          '<div class="prow"><span class="lab"><span class="d" style="background:var(--danger)"></span>Divergentes</span><span class="v" style="color:var(--danger)">4</span></div>'+
        '</div>'+
        '<div class="scanner '+dim+'"><i class="ti ti-qr-code"></i><div class="t">Leitor de código de barras</div>'+
          '<div class="s">Conecte um leitor USB para acelerar a contagem.</div>'+
          '<div class="lk" id="cfg-reader">Configurar leitor</div></div>'+
      '</div></div>';

    $("#toggle-pause").onclick=function(){ state.paused=!state.paused; render(); toast(state.paused?"Contagem pausada. Progresso salvo.":"Contagem retomada.", state.paused?"warn":"info"); };
    var gr=$("#go-report"); if(gr) gr.onclick=function(){ state.screen="report"; scrollTop(); render(); };
    var cfg=$("#cfg-reader"); if(cfg) cfg.onclick=function(){ toast("Abrindo a configuração do leitor...", "info"); };

    document.querySelectorAll(".tab").forEach(function(t){ t.onclick=function(){ state.sector=+t.getAttribute("data-sec"); render(); }; });
    if(!state.paused){
      document.querySelectorAll(".stepper [data-d]").forEach(function(b){
        b.onclick=function(){ var i=+b.getAttribute("data-i"), r=state.rows[i];
          var base=r.contagem===null?0:r.contagem; r.contagem=Math.max(0, base+parseInt(b.getAttribute("data-d"),10)); render(); };
      });
      document.querySelectorAll(".stepper input").forEach(function(inp){
        inp.addEventListener("change", function(){ var i=+inp.getAttribute("data-i"); var v=parseInt(inp.value,10);
          state.rows[i].contagem=isNaN(v)?null:Math.max(0,v); render(); });
      });
    }
  }

  /* ---------- Report ---------- */
  function renderReport(){
    var stats=REPORT.stats.map(function(s){
      return '<div class="stat '+s.cls+'"><div class="topc"></div>'+
        '<div class="lab">'+(s.ti?'<i class="ti ti-'+s.ti+'"></i>':'')+s.lab+'</div>'+
        '<div><span class="num">'+s.num+'</span><span class="den">'+s.den+'</span></div></div>';
    }).join("");
    var disc=REPORT.disc.map(function(d){
      return '<div class="dcard '+(d.up?'up':'')+'"><div class="top"><div><div class="code">#'+d.id+'</div><h4>'+d.name+'</h4></div>'+
        '<span class="trend '+(d.up?'up':'')+'"><i class="ti ti-trending-'+(d.up?'up':'down')+'"></i></span></div>'+
        '<div class="vals"><div class="vbox cont"><div class="k">Contagem realizada</div><div class="v">'+d.cont+'</div></div>'+
        '<div class="vbox"><div class="k">Esperado no sistema</div><div class="v">'+d.esp+'</div></div></div></div>';
    }).join("");
    var rows=REPORT.table.map(function(t){
      var diff=t.cont-t.sis; var dc=diff<0?'neg':diff>0?'pos':'zero'; var ds=(diff>0?'+':'')+diff;
      return '<div class="rtr"><div class="rcode">'+t.code+'</div><div class="rname">'+t.name+'</div>'+
        '<div class="rnum">'+t.sis+'</div><div class="rnum">'+t.cont+'</div>'+
        '<div class="rdiff '+dc+'">'+ds+'</div>'+
        '<div class="c"><span class="pill '+t.status+'"><span class="pd"></span>'+STLABEL[t.status]+'</span></div></div>';
    }).join("");

    $("#page").innerHTML =
      '<div class="rep-head"><h2>Relatório de Contagem</h2>'+
        '<div class="rep-meta"><span class="chip"><i class="ti ti-calendar"></i>'+REPORT.date+'</span>'+
        '<span class="chip id"><i class="ti ti-hash"></i>ID: '+REPORT.id+'</span></div></div>'+
      '<div class="stats">'+stats+'</div>'+
      '<div class="sec-title">Alertas de Discrepância <span class="badge">3 críticos</span></div>'+
      '<div class="disc">'+disc+'</div>'+
      '<div class="sec-title">Detalhamento da Contagem</div>'+
      '<div class="rtable"><div class="rth"><div>Código</div><div>Produto</div><div class="c">Sistema</div><div class="c">Contado</div><div class="c">Diferença</div><div class="c">Status</div></div>'+rows+'</div>'+
      '<div class="rep-foot"><div class="note"><i class="ti ti-info-circle"></i>A atualização de estoque gerará um lote de ajuste contábil automático.</div>'+
        '<div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-outline btn-lg" id="back-correct"><i class="ti ti-arrow-left"></i>Voltar e corrigir</button>'+
        '<button class="btn btn-primary btn-lg" id="commit"><i class="ti ti-refresh"></i>Atualizar estoque</button></div></div>';

    $("#back-correct").onclick=function(){ state.screen="active"; scrollTop(); render(); };
    $("#commit").onclick=function(){ state.screen="success"; scrollTop(); render(); };
  }

  /* ---------- Success ---------- */
  function renderSuccess(){
    $("#page").innerHTML =
      '<div class="success"><div class="success-inner">'+
        '<div class="success-ico"><i class="ti ti-circle-check"></i></div>'+
        '<h2>Estoque Atualizado com Sucesso!</h2>'+
        '<p class="lead">Os dados da contagem foram processados e o saldo de estoque foi atualizado no sistema.</p>'+
        '<div class="acards">'+
          '<button class="acard p" id="go-quote"><span class="ai"><i class="ti ti-shopping-cart-check"></i></span>'+
            '<span class="at"><h4>Iniciar Cotação de Compras</h4><p>Planeje os pedidos com base no novo saldo de estoque.</p></span>'+
            '<span class="chev"><i class="ti ti-chevron-right"></i></span></button>'+
          '<button class="acard n" id="go-home"><span class="ai"><i class="ti ti-home"></i></span>'+
            '<span class="at"><h4>Voltar para o Início</h4><p>Retorne ao painel principal para ver outros indicadores.</p></span>'+
            '<span class="chev"><i class="ti ti-chevron-right"></i></span></button>'+
        '</div>'+
      '</div></div>';
    $("#go-quote").onclick=function(){ window.location.href="planejamento.html"; };
    $("#go-home").onclick=function(){ window.location.href="index.html"; };
  }

  function scrollTop(){ window.scrollTo(0,0); }
  document.addEventListener("click", function(e){
    var go=e.target.closest && e.target.closest("[data-href]");
    if(go){ window.location.href=go.getAttribute("data-href"); return; }
    var nav=e.target.closest && e.target.closest("[data-nav]");
    if(nav){ toast('"'+nav.getAttribute("data-nav")+'" faz parte de outro fluxo do protótipo.', "info"); }
  });

  initData();
  render();
})();
</script>
</body>
</html>
