<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro — Gerenciamento de Estoque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#1A5FCC;
    --primary-soft:#EBF2FF;
    --danger:#EF3E3C;
    --danger-soft:#FDEAEA;
    --success:#348853;
    --success-soft:#E6F2EA;
    --amber:#D97706;
    --amber-soft:#FEF3C7;
    --amber-border:#FCD34D;
    --ink:#232323;
    --offwhite:#F2EFE4;
    --white:#FFFFFF;
    --gray:#F5F4F0;
    --border:#E0DDD5;
    --muted:#6B7280;
    --row-crit:#FFF5F5;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --sans:"DM Sans", system-ui, -apple-system, sans-serif;
    --radius-card:10px;
    --radius-btn:7px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--offwhite);
    -webkit-font-smoothing:antialiased;
    font-size:14px;
    line-height:1.45;
  }
  .ti{font-size:20px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .ti>svg{width:1em;height:1em;display:block;stroke:currentColor;fill:none}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .mono{font-family:var(--mono)}

  /* ---------- App shell ---------- */
  .app{display:flex;min-height:100vh;width:100%}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:236px;flex:0 0 236px;background:var(--white);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:22px 0;
    position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto;
  }
  .brand{padding:0 22px 24px}
  .brand-logo{width:172px;height:auto;display:block;margin-bottom:10px}
  .brand h1{font-size:24px;font-weight:700;color:var(--primary);letter-spacing:-.01em}
  .brand p{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.04em}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1}
  .nav .sep{height:1px;background:var(--border);margin:12px 8px}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;
    color:var(--muted);font-size:13.5px;font-weight:500;transition:background .15s,color .15s;
  }
  .nav-item:hover{background:var(--gray);color:var(--ink)}
  .nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
  .nav-item .ti{font-size:20px}
  .nav-cta{padding:12px 16px 4px}
  .nav-bottom{padding:0 12px;border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:2px}

  /* ---------- Content ---------- */
  .content{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{
    height:62px;background:var(--white);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 28px;
    position:sticky;top:0;z-index:30;
  }
  .search{
    display:flex;align-items:center;gap:8px;background:var(--gray);
    border:1px solid var(--border);border-radius:999px;padding:8px 16px;width:360px;max-width:42vw;
    transition:border .15s,box-shadow .15s;
  }
  .search:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .search .ti{color:var(--muted);font-size:18px}
  .search input{border:none;background:none;outline:none;width:100%;font-size:13.5px;color:var(--ink);font-family:var(--sans)}
  .topbar-actions{display:flex;align-items:center;gap:18px}
  .icon-btn{color:var(--muted);position:relative;display:flex;align-items:center;transition:color .15s}
  .icon-btn:hover{color:var(--primary)}
  .icon-btn .dot{position:absolute;top:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid var(--white)}

  .page{padding:26px 28px;max-width:1320px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px}

  /* ---------- Page header ---------- */
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .page-head h2{font-size:28px;font-weight:700;letter-spacing:-.015em}
  .page-head p{color:var(--muted);font-size:14px;margin-top:4px}
  .head-actions{display:flex;gap:10px;flex-wrap:wrap}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.02em;
    padding:9px 16px;border-radius:var(--radius-btn);transition:all .15s;white-space:nowrap;
  }
  .btn .ti{font-size:17px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:#1550b0}
  .btn-outline{border:1px solid var(--border);background:var(--white);color:var(--ink)}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
  .btn-green{background:var(--success);color:#fff;width:100%}
  .btn-green:hover{background:#2c7146}
  .btn-ghost{color:var(--muted);background:transparent}
  .btn-ghost:hover{color:var(--ink);background:var(--gray)}
  .btn-danger-text{color:var(--danger);background:transparent;width:100%}
  .btn-danger-text:hover{background:var(--danger-soft)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-danger:hover{background:#d8302e}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- Filters bar ---------- */
  .filters{
    background:var(--white);border:1px solid var(--border);border-radius:var(--radius-card);
    padding:14px 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .field{display:flex;flex-direction:column;gap:5px;min-width:180px}
  .field label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.03em}
  .select{position:relative}
  .select select{
    appearance:none;width:100%;background:var(--white);border:1px solid var(--border);
    border-radius:8px;padding:9px 34px 9px 12px;font-size:13.5px;color:var(--ink);
    font-family:var(--sans);outline:none;cursor:pointer;transition:border .15s,box-shadow .15s;
  }
  .select select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .select .ti{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:18px}
  .filter-left{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .toggle{display:flex;gap:6px}
  .toggle button{
    width:38px;height:38px;border:1px solid var(--border);border-radius:8px;background:var(--white);
    color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;
  }
  .toggle button:hover{background:var(--gray)}
  .toggle button.active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

  /* ---------- Layout grid ---------- */
  .grid{display:grid;grid-template-columns:1fr 332px;gap:18px;align-items:start}
  @media (max-width:1080px){.grid{grid-template-columns:1fr}}

  /* ---------- List card ---------- */
  .card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-card);overflow:hidden}
  .card-head{
    background:var(--gray);padding:11px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .card-head .ttl{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .card-head .count{font-family:var(--mono);font-size:11px;color:var(--muted)}

  table{width:100%;border-collapse:collapse}
  thead th{
    text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--muted);font-weight:500;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--gray);
  }
  thead th.r{text-align:right}
  thead th.c{text-align:center}
  tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--gray)}
  tbody tr.crit{background:var(--row-crit)}
  tbody tr.crit:hover{background:#ffecec}
  tbody tr.selected{background:var(--primary-soft)}
  tbody tr.selected:hover{background:#e1ebfb}
  td{padding:13px 16px;vertical-align:middle}
  td.r{text-align:right}
  td.c{text-align:center}
  .item-cell{display:flex;align-items:center;gap:12px}
  .item-ico{
    width:38px;height:38px;border-radius:9px;background:var(--gray);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;color:var(--muted);flex:0 0 38px;
  }
  .item-ico .ti{font-size:20px}
  .item-name{font-weight:600;font-size:14px}
  .cat-tag{font-family:var(--mono);font-size:11px;color:var(--ink);background:var(--gray);border:1px solid var(--border);padding:3px 8px;border-radius:6px}
  .qty{font-weight:600;font-size:14px}
  .qty small{color:var(--muted);font-weight:500}

  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px}
  .pill .pdot{width:7px;height:7px;border-radius:50%}
  .pill.crit{background:var(--danger-soft);color:var(--danger)}
  .pill.crit .pdot{background:var(--danger)}
  .pill.warn{background:var(--amber-soft);color:var(--amber)}
  .pill.warn .pdot{background:var(--amber)}
  .pill.ok{background:var(--success-soft);color:var(--success)}
  .pill.ok .pdot{background:var(--success)}

  .row-actions{display:flex;justify-content:flex-end;gap:4px;opacity:0;transition:opacity .12s}
  tr:hover .row-actions{opacity:1}
  .row-actions button{width:30px;height:30px;border-radius:7px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .row-actions .edit:hover{color:var(--primary);background:var(--primary-soft)}
  .row-actions .del:hover{color:var(--danger);background:var(--danger-soft)}

  /* ---------- Empty state (table) ---------- */
  .empty{padding:54px 24px;text-align:center;color:var(--muted)}
  .empty .ti{font-size:40px;color:var(--border);margin-bottom:10px}
  .empty h4{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px}
  .empty p{font-size:13px;margin-bottom:16px}

  /* ---------- Grid view ---------- */
  .gview{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:14px;padding:16px}
  .gcard{
    background:var(--white);border:1px solid var(--border);border-radius:var(--radius-card);
    padding:14px;cursor:pointer;transition:border .15s,box-shadow .15s,transform .15s;position:relative;overflow:hidden;
  }
  .gcard:hover{border-color:var(--primary);box-shadow:0 6px 16px -8px rgba(26,95,204,.3);transform:translateY(-2px)}
  .gcard.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .gcard .topbar-color{position:absolute;top:0;left:0;right:0;height:3px}
  .gcard .topbar-color.crit{background:var(--danger)}
  .gcard .topbar-color.warn{background:var(--amber)}
  .gcard .topbar-color.ok{background:var(--success)}
  .gcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:4px}
  .gcard h5{font-size:14px;font-weight:600;margin:6px 0 2px;line-height:1.3}
  .gcard .gqty{display:flex;align-items:baseline;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .gcard .gqty .big{font-size:20px;font-weight:700;font-family:var(--mono)}

  /* ---------- Detail panel ---------- */
  .detail{
    background:var(--white);border:1px solid var(--border);border-radius:var(--radius-card);
    position:relative;overflow:hidden;position:sticky;top:78px;
  }
  .detail .accent{height:3px;background:var(--primary)}
  .detail-pad{padding:18px}
  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .detail-id{display:flex;align-items:center;gap:12px}
  .detail-ico{width:46px;height:46px;border-radius:10px;background:var(--primary-soft);border:1px solid #cfe0fb;display:flex;align-items:center;justify-content:center;color:var(--primary);flex:0 0 46px}
  .detail-ico .ti{font-size:24px}
  .detail-id h3{font-size:18px;font-weight:700;line-height:1.2}
  .detail-id .sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
  .close{width:30px;height:30px;border-radius:7px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .close:hover{background:var(--gray);color:var(--ink)}
  .info{margin-top:16px;display:flex;flex-direction:column}
  .info .row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
  .info .row:last-child{border-bottom:none}
  .info .k{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.02em}
  .info .v{font-size:13.5px;font-weight:600}
  .info .v.link{color:var(--primary)}
  .info .v.link:hover{text-decoration:underline;cursor:pointer}
  .adjust{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .adjust h4{font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .stepper{display:flex;align-items:center;justify-content:space-between;background:var(--gray);border:1px solid var(--border);border-radius:8px;padding:4px;margin-bottom:10px}
  .stepper button{width:34px;height:34px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .stepper button:hover{border-color:var(--primary);color:var(--primary)}
  .stepper .val{font-family:var(--mono);font-size:20px;font-weight:500}
  .detail-btns{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .detail-foot{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .detail-empty{padding:54px 22px;text-align:center;color:var(--muted)}
  .detail-empty .ti{font-size:42px;color:var(--border);margin-bottom:12px}
  .detail-empty h4{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px}
  .detail-empty p{font-size:13px}

  /* ---------- Edit / New form ---------- */
  .form-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .back{width:36px;height:36px;border-radius:50%;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s}
  .back:hover{background:var(--gray);color:var(--primary)}
  .form-head h2{font-size:26px;font-weight:700;letter-spacing:-.01em}
  .form-head .crumb{color:var(--muted);font-size:13px;margin-top:2px}
  .form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-card);padding:26px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media (max-width:760px){.form-grid{grid-template-columns:1fr}}
  .form-grid .full{grid-column:1/-1}
  .ff{display:flex;flex-direction:column;gap:6px}
  .ff label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.03em}
  .ff input,.ff .select select{
    width:100%;background:var(--white);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;font-size:14px;color:var(--ink);font-family:var(--sans);outline:none;transition:border .15s,box-shadow .15s;
  }
  .ff input:focus,.ff .select select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .ff.err input{border-color:var(--danger);box-shadow:0 0 0 3px var(--danger-soft)}
  .ff .errmsg{font-family:var(--mono);font-size:11px;color:var(--danger);display:none}
  .ff.err .errmsg{display:block}
  .num-step{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--white)}
  .num-step:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .num-step button{width:42px;align-self:stretch;background:var(--gray);color:var(--ink);border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:background .12s}
  .num-step button.plus{border-right:none;border-left:1px solid var(--border)}
  .num-step button:hover{background:#ebe9e1}
  .num-step input{border:none!important;box-shadow:none!important;text-align:center;font-family:var(--mono);font-weight:500}
  .price-wrap{position:relative}
  .price-wrap .pre{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .price-wrap input{padding-left:38px}
  .form-foot{display:flex;justify-content:flex-end;gap:12px;margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}

  /* ---------- Modal ---------- */
  .overlay{position:absolute;inset:0;background:rgba(35,35,35,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fade .15s ease}
  .modal{background:var(--white);border-radius:14px;max-width:420px;width:100%;padding:26px;box-shadow:0 24px 60px -20px rgba(0,0,0,.4);animation:pop .18s ease}
  .modal .m-ico{width:52px;height:52px;border-radius:50%;background:var(--danger-soft);color:var(--danger);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .modal .m-ico .ti{font-size:26px}
  .modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
  .modal p{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:22px}
  .modal p b{color:var(--ink)}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end}

  /* ---------- Toasts ---------- */
  .toasts{position:absolute;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:80}
  .toast{
    background:var(--white);border:1px solid var(--border);border-left:4px solid var(--success);
    border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:11px;
    box-shadow:0 12px 30px -12px rgba(0,0,0,.25);min-width:260px;max-width:340px;animation:slidein .22s ease;
  }
  .toast.info{border-left-color:var(--primary)}
  .toast.warn{border-left-color:var(--amber)}
  .toast .ti{font-size:20px}
  .toast.success .ti{color:var(--success)}
  .toast.info .ti{color:var(--primary)}
  .toast.warn .ti{color:var(--amber)}
  .toast .t-txt{font-size:13.5px;font-weight:500;line-height:1.35}
  .toast.leaving{animation:slideout .2s ease forwards}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideout{to{opacity:0;transform:translateX(20px)}}
  .hidden{display:none!important}

  @media (max-width:820px){
    .sidebar{display:none}
    .search{max-width:none;width:200px}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar -->

  function hydrateIcons(root){
    var scope = root || document;
    var list = scope.querySelectorAll('i.ti');
    Array.prototype.forEach.call(list, function(el){
      if(el.getAttribute('data-hi')) return;
      var name=null, cls=(el.className||'').split(/\s+/);
      for(var i=0;i<cls.length;i++){ if(cls[i]!=='ti' && cls[i].indexOf('ti-')===0){ name=cls[i].slice(3); break; } }
      if(name && ICONS[name]){
        el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
      }
      el.setAttribute('data-hi','1');
    });
  }
  function statusOf(it){
    if(it.qty <= it.min*0.3) return "critico";
    if(it.qty < it.min) return "baixo";
    return "normal";
  }
  function critLabel(s){return s==="critico"?"Crítico":s==="baixo"?"Baixo":"Normal";}
  function brl(n){return "R$ " + n.toFixed(2).replace(".",",");}
  function parsePrice(str){
    var n = parseFloat(String(str).replace(/\./g,"").replace(",","."));
    return isNaN(n)?0:n;
  }
  function byId(id){for(var i=0;i<items.length;i++){if(items[i].id===id)return items[i];}return null;}

  function filtered(){
    return items.filter(function(it){
      if(state.fCat!=="todas" && it.cat!==state.fCat) return false;
      if(state.fCrit!=="todos" && statusOf(it)!==state.fCrit) return false;
      if(state.search){
        var q=state.search.toLowerCase();
        if(it.name.toLowerCase().indexOf(q)===-1 && it.id.toLowerCase().indexOf(q)===-1) return false;
      }
      return true;
    });
  }

  /* ---------- Render: list / grid ---------- */
  function render(){
    var data = filtered();
    $("#count").textContent = "Mostrando " + data.length + (data.length===1?" item":" itens");

    if(data.length===0){
      $("#list-body").innerHTML =
        '<div class="empty">'+
          '<div><i class="ti ti-search-off"></i></div>'+
          '<h4>Nenhum insumo encontrado</h4>'+
          '<p>Ajuste a busca ou os filtros para ver mais resultados.</p>'+
          '<button class="btn btn-outline" id="clear-filters"><i class="ti ti-filter-off"></i>Limpar filtros</button>'+
        '</div>';
      $("#clear-filters").onclick = clearFilters;
    } else if(state.layout==="list"){
      renderTable(data);
    } else {
      renderGrid(data);
    }
    renderDetail();
    hydrateIcons(document);
  }

  function renderTable(data){
    var rows = data.map(function(it){
      var s = statusOf(it);
      var sel = it.id===state.selectedId ? " selected" : "";
      var critRow = (s==="critico" && !sel) ? " crit" : "";
      return ''+
      '<tr class="'+s+critRow+sel+'" data-id="'+it.id+'">'+
        '<td><div class="item-cell">'+
          '<div class="item-ico"><i class="ti '+it.icon+'"></i></div>'+
          '<div><div class="item-name">'+it.name+'</div></div>'+
        '</div></td>'+
        '<td><span class="cat-tag">'+it.cat+'</span></td>'+
        '<td class="r"><span class="qty">'+it.qty+' <small>'+it.unit+'</small></span></td>'+
        '<td class="c"><span class="pill '+STATUS[s].cls+'"><span class="pdot"></span>'+STATUS[s].label+'</span></td>'+
        '<td class="r"><div class="row-actions">'+
          '<button class="edit" data-edit="'+it.id+'" title="Editar"><i class="ti ti-pencil"></i></button>'+
          '<button class="del" data-del="'+it.id+'" title="Remover"><i class="ti ti-trash"></i></button>'+
        '</div></td>'+
      '</tr>';
    }).join("");

    $("#list-body").innerHTML =
      '<table><thead><tr>'+
        '<th>Insumo</th><th>Categoria</th><th class="r">Qtd. Atual</th>'+
        '<th class="c">Status</th><th class="r">Ações</th>'+
      '</tr></thead><tbody>'+rows+'</tbody></table>';

    bindRows();
  }

  function renderGrid(data){
    var cards = data.map(function(it){
      var s = statusOf(it);
      var sel = it.id===state.selectedId ? " selected" : "";
      return ''+
      '<div class="gcard'+sel+'" data-id="'+it.id+'">'+
        '<div class="topbar-color '+STATUS[s].cls+'"></div>'+
        '<div class="gcard-top">'+
          '<div class="item-ico"><i class="ti '+it.icon+'"></i></div>'+
          '<span class="pill '+STATUS[s].cls+'"><span class="pdot"></span>'+STATUS[s].label+'</span>'+
        '</div>'+
        '<h5>'+it.name+'</h5>'+
        '<span class="cat-tag">'+it.cat+'</span>'+
        '<div class="gqty"><span class="k mono" style="font-size:11px;color:var(--muted)">Qtd. atual</span>'+
          '<span class="big">'+it.qty+' <small style="font-size:12px;color:var(--muted)">'+it.unit+'</small></span></div>'+
      '</div>';
    }).join("");
    $("#list-body").innerHTML = '<div class="gview">'+cards+'</div>';
    bindRows();
  }

  function bindRows(){
    var els = document.querySelectorAll("[data-id]");
    els.forEach(function(el){
      el.addEventListener("click", function(e){
        if(e.target.closest("[data-edit]") || e.target.closest("[data-del]")) return;
        selectItem(el.getAttribute("data-id"));
      });
    });
    document.querySelectorAll("[data-edit]").forEach(function(b){
      b.addEventListener("click", function(e){ e.stopPropagation(); openForm("edit", b.getAttribute("data-edit")); });
    });
    document.querySelectorAll("[data-del]").forEach(function(b){
      b.addEventListener("click", function(e){ e.stopPropagation(); confirmRemove(b.getAttribute("data-del")); });
    });
  }

  /* ---------- Render: detail panel ---------- */
  function renderDetail(){
    var host = $("#detail");
    var it = state.selectedId ? byId(state.selectedId) : null;
    if(!it){
      host.innerHTML =
        '<div class="card detail" style="position:sticky;top:78px">'+
          '<div class="detail-empty">'+
            '<div><i class="ti ti-click"></i></div>'+
            '<h4>Selecione um insumo</h4>'+
            '<p>Toque em um item da lista para ver detalhes e ajustar o estoque.</p>'+
          '</div>'+
        '</div>';
      return;
    }
    var s = statusOf(it);
    if(state.adjustVal===null) state.adjustVal = it.qty;
    host.innerHTML =
      '<div class="detail">'+
        '<div class="accent"></div>'+
        '<div class="detail-pad">'+
          '<div class="detail-head">'+
            '<div class="detail-id">'+
              '<div class="detail-ico"><i class="ti '+it.icon+'"></i></div>'+
              '<div><h3>'+it.name+'</h3><div class="sub">ID: #'+it.id+'</div></div>'+
            '</div>'+
            '<button class="close" id="d-close"><i class="ti ti-x"></i></button>'+
          '</div>'+
          '<div class="info">'+
            row("Categoria", it.cat)+
            row("Setor", it.sector)+
            row("Status", '<span class="pill '+STATUS[s].cls+'" style="font-size:11px"><span class="pdot"></span>'+STATUS[s].label+'</span>', true)+
            row("Qtd. atual", it.qty+" "+it.unit)+
            row("Mínimo ideal", it.min+" "+it.unit)+
            row("Preço unit. médio", brl(it.price))+
            row("Último fornecedor", '<span class="v link" id="d-supplier">'+it.supplier+'</span>', true)+
          '</div>'+
          '<div class="adjust">'+
            '<h4>Ajuste de estoque</h4>'+
            '<div class="stepper">'+
              '<button id="d-minus"><i class="ti ti-minus"></i></button>'+
              '<span class="val" id="d-val">'+state.adjustVal+'</span>'+
              '<button id="d-plus"><i class="ti ti-plus"></i></button>'+
            '</div>'+
            '<div class="detail-btns">'+
              '<button class="btn btn-green" id="d-update"><i class="ti ti-refresh"></i>Atualizar estoque</button>'+
              '<button class="btn btn-outline" id="d-edit" style="width:100%"><i class="ti ti-pencil"></i>Editar informações</button>'+
              '<button class="btn btn-danger-text" id="d-remove"><i class="ti ti-trash"></i>Remover do estoque</button>'+
            '</div>'+
          '</div>'+
          '<div class="detail-foot"><span>Última contagem</span><span>Hoje, 08:30</span></div>'+
        '</div>'+
      '</div>';

    $("#d-close").onclick = function(){ state.selectedId=null; state.adjustVal=null; render(); };
    $("#d-minus").onclick = function(){ state.adjustVal=Math.max(0,state.adjustVal-1); $("#d-val").textContent=state.adjustVal; };
    $("#d-plus").onclick  = function(){ state.adjustVal=state.adjustVal+1; $("#d-val").textContent=state.adjustVal; };
    $("#d-update").onclick = function(){
      it.qty = state.adjustVal;
      state.adjustVal = null;
      render();
      toast("Estoque de "+it.name+" atualizado.", "success");
    };
    $("#d-edit").onclick = function(){ openForm("edit", it.id); };
    $("#d-remove").onclick = function(){ confirmRemove(it.id); };
    $("#d-supplier").onclick = function(){ toast("Abrindo ficha de "+it.supplier+" em Fornecedores...", "info"); };
  }

  function row(k,v,raw){
    return '<div class="row"><span class="k">'+k+'</span>'+(raw?v:'<span class="v">'+v+'</span>')+'</div>';
  }

  function selectItem(id){
    state.selectedId = id;
    state.adjustVal = null;
    render();
  }

  function clearFilters(){
    state.fCat="todas"; state.fCrit="todos"; state.search="";
    $("#f-cat").value="todas"; $("#f-crit").value="todos"; $("#search").value="";
    render();
  }

  /* ---------- Form (edit / new) ---------- */
  function openForm(mode, id){
    state.formMode = mode;
    state.formId = id || null;
    var it = id ? byId(id) : null;

    $("#form-title").textContent = mode==="new" ? "Novo Insumo" : "Editar Insumo";
    $("#save-label").textContent = mode==="new" ? "Adicionar insumo" : "Confirmar edições";
    $("#form-crumb").textContent = "Gerenciamento de Estoque / " + (it ? it.name : "Novo insumo");

    $("#i-name").value     = it ? it.name : "";
    $("#i-cat").value      = it ? it.cat : "Grãos";
    $("#i-sector").value   = it ? it.sector : "Despensa";
    $("#i-unit").value     = it ? it.unit : "un";
    $("#i-qty").value      = it ? it.qty : 0;
    $("#i-min").value      = it ? it.min : 0;
    $("#i-price").value    = it ? it.price.toFixed(2).replace(".",",") : "";
    $("#i-supplier").value = it ? it.supplier : "";
    syncCrit();
    $("#ff-name").classList.remove("err");

    $("#view-list").classList.add("hidden");
    $("#view-form").classList.remove("hidden");
    window.scrollTo(0,0);
  }

  function syncCrit(){
    var qty = parseInt($("#i-qty").value,10)||0;
    var min = parseInt($("#i-min").value,10)||0;
    var s = qty <= min*0.3 ? "Crítico" : (qty < min ? "Baixo" : "Normal");
    $("#i-crit").value = s;
  }

  function closeForm(){
    $("#view-form").classList.add("hidden");
    $("#view-list").classList.remove("hidden");
    window.scrollTo(0,0);
  }

  function saveForm(){
    var name = $("#i-name").value.trim();
    if(!name){ $("#ff-name").classList.add("err"); $("#i-name").focus(); return; }
    $("#ff-name").classList.remove("err");

    var payload = {
      name:name,
      cat:$("#i-cat").value,
      sector:$("#i-sector").value,
      unit:$("#i-unit").value,
      qty:parseInt($("#i-qty").value,10)||0,
      min:parseInt($("#i-min").value,10)||0,
      price:parsePrice($("#i-price").value),
      supplier:$("#i-supplier").value.trim() || "—"
    };

    if(state.formMode==="new"){
      var prefix = {"Grãos":"GR","Laticínios":"LT","Embalagens":"EM","Limpeza":"LP"}[payload.cat]||"IN";
      payload.id = prefix+"-"+String(Math.floor(Math.random()*900)+100);
      payload.icon = "ti-package";
      items.unshift(payload);
      state.selectedId = payload.id;
      state.adjustVal = null;
      toast(name+" adicionado ao estoque.", "success");
    } else {
      var it = byId(state.formId);
      Object.assign(it, payload);
      state.adjustVal = null;
      toast("Informações de "+name+" salvas.", "success");
    }
    closeForm();
    render();
  }

  /* ---------- Remove modal ---------- */
  function confirmRemove(id){
    var it = byId(id);
    if(!it) return;
    $("#modal-root").innerHTML =
      '<div class="overlay" id="ovl">'+
        '<div class="modal">'+
          '<div class="m-ico"><i class="ti ti-trash"></i></div>'+
          '<h3>Remover insumo?</h3>'+
          '<p>Tem certeza que deseja remover <b>'+it.name+'</b> do estoque? Esta ação não pode ser desfeita.</p>'+
          '<div class="modal-foot">'+
            '<button class="btn btn-outline" id="m-cancel">Cancelar</button>'+
            '<button class="btn btn-danger" id="m-confirm"><i class="ti ti-trash"></i>Remover</button>'+
          '</div>'+
        '</div>'+
      '</div>';
    hydrateIcons($("#modal-root"));
    var close = function(){ $("#modal-root").innerHTML=""; };
    $("#m-cancel").onclick = close;
    $("#ovl").onclick = function(e){ if(e.target.id==="ovl") close(); };
    $("#m-confirm").onclick = function(){
      items = items.filter(function(x){return x.id!==id;});
      if(state.selectedId===id){ state.selectedId=null; state.adjustVal=null; }
      close();
      render();
      toast(it.name+" removido do estoque.", "warn");
    };
  }

  /* ---------- Toasts ---------- */
  function toast(msg, type){
    type = type||"success";
    var ico = type==="success"?"ti-circle-check":type==="warn"?"ti-alert-triangle":"ti-info-circle";
    var el = document.createElement("div");
    el.className = "toast "+type;
    el.innerHTML = '<i class="ti '+ico+'"></i><span class="t-txt">'+msg+'</span>';
    $("#toasts").appendChild(el);
    hydrateIcons(el);
    setTimeout(function(){
      el.classList.add("leaving");
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 200);
    }, 2600);
  }

  /* ---------- Wire up controls ---------- */
  $("#f-cat").addEventListener("change", function(){ state.fCat=this.value; render(); });
  $("#f-crit").addEventListener("change", function(){ state.fCrit=this.value; render(); });
  $("#search").addEventListener("input", function(){ state.search=this.value.trim(); render(); });

  $("#t-list").addEventListener("click", function(){
    state.layout="list"; this.classList.add("active"); $("#t-grid").classList.remove("active"); render();
  });
  $("#t-grid").addEventListener("click", function(){
    state.layout="grid"; this.classList.add("active"); $("#t-list").classList.remove("active"); render();
  });

  $("#btn-new").addEventListener("click", function(){ openForm("new"); });
  $("#btn-count").addEventListener("click", function(){ window.location.href="contagem.html"; });

  $("#form-back").addEventListener("click", closeForm);
  $("#form-cancel").addEventListener("click", closeForm);
  $("#form-save").addEventListener("click", saveForm);
  $("#i-qty").addEventListener("input", syncCrit);
  $("#i-min").addEventListener("input", syncCrit);
  document.querySelectorAll("[data-step]").forEach(function(b){
    b.addEventListener("click", function(){
      var field = b.getAttribute("data-step")==="qty" ? "#i-qty" : "#i-min";
      var inp = $(field);
      var v = Math.max(0,(parseInt(inp.value,10)||0) + parseInt(b.getAttribute("data-d"),10));
      inp.value = v; syncCrit();
    });
  });

  document.querySelectorAll("[data-href]").forEach(function(el){
    el.style.cursor="pointer";
    el.addEventListener("click", function(){ window.location.href=el.getAttribute("data-href"); });
  });

  document.querySelectorAll("[data-nav]").forEach(function(el){
    el.addEventListener("click", function(){
      toast("\""+el.getAttribute("data-nav")+"\" faz parte de outro fluxo do protótipo.", "info");
    });
  });

  /* ---------- Init ---------- */
  render();
})();
</script>
</body>
</html>
