<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro — Planejamento de Compras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#1A5FCC; --primary-soft:#EBF2FF;
    --danger:#EF3E3C; --danger-soft:#FDEAEA;
    --success:#348853; --success-soft:#E6F2EA;
    --amber:#D97706; --amber-soft:#FEF3C7;
    --ink:#232323; --offwhite:#F2EFE4; --white:#FFFFFF;
    --gray:#F5F4F0; --border:#E0DDD5; --muted:#6B7280;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --sans:"DM Sans", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--offwhite);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  .ti{font-size:20px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .ti>svg{width:1em;height:1em;display:block;stroke:currentColor;fill:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:inherit;text-decoration:none}
  .mono{font-family:var(--mono)}
  .r{text-align:right}.c{text-align:center}
  .hidden{display:none!important}

  .app{display:flex;min-height:100vh;width:100%}

  /* Sidebar */
  .sidebar{width:236px;flex:0 0 236px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 0;position:sticky;top:0;align-self:flex-start;height:100vh;overflow-y:auto}
  .brand{padding:0 22px 24px}
  .brand-logo{width:172px;height:auto;display:block;margin-bottom:10px}
  .brand p{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--muted);font-size:13.5px;font-weight:500;transition:background .15s,color .15s}
  .nav-item:hover{background:var(--gray);color:var(--ink)}
  .nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
  .nav-cta{padding:12px 16px 4px}
  .nav-bottom{padding:0 12px;border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:2px}

  /* Content */
  .content{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:62px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:40}
  .search{display:flex;align-items:center;gap:8px;background:var(--gray);border:1px solid var(--border);border-radius:999px;padding:8px 16px;width:340px;max-width:42vw;transition:border .15s,box-shadow .15s}
  .search:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .search .ti{color:var(--muted);font-size:18px}
  .search input{border:none;background:none;outline:none;width:100%;font-size:13.5px;color:var(--ink);font-family:var(--sans)}
  .topbar-actions{display:flex;align-items:center;gap:18px}
  .icon-btn{color:var(--muted);position:relative;display:flex;align-items:center;transition:color .15s}
  .icon-btn:hover{color:var(--primary)}
  .icon-btn .dot{position:absolute;top:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid var(--white)}

  .scroll{flex:1;display:flex;flex-direction:column;overflow-y:auto}
  .page{padding:24px 28px 20px;max-width:1320px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px;flex:1}

  /* Page header + steps */
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .page-head h2{font-size:26px;font-weight:700;letter-spacing:-.015em}
  .page-head p{color:var(--muted);font-size:14px;margin-top:4px}
  .head-actions{display:flex;gap:10px;flex-wrap:wrap;position:relative}

  .steps{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px}
  .stepitem{display:flex;align-items:center;gap:8px}
  .stepnum{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;border:1.5px solid var(--border);color:var(--muted);background:#fff}
  .stepnum .ti{font-size:14px}
  .stepitem.active .stepnum{background:var(--primary);border-color:var(--primary);color:#fff}
  .stepitem.done .stepnum{background:var(--success);border-color:var(--success);color:#fff}
  .steplabel{font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:var(--muted)}
  .stepitem.active .steplabel{color:var(--primary);font-weight:600}
  .stepitem.done .steplabel{color:var(--success)}
  .stepline{width:26px;height:1.5px;background:var(--border)}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.02em;padding:9px 16px;border-radius:7px;transition:all .15s;white-space:nowrap}
  .btn .ti{font-size:17px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:#1550b0}
  .btn-outline{border:1px solid var(--border);background:var(--white);color:var(--ink)}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
  .btn-lg{font-size:13px;padding:11px 22px}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* Filter popover */
  .popover{position:absolute;top:46px;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 14px 36px -14px rgba(0,0,0,.3);padding:12px;min-width:200px;z-index:50}
  .popover h5{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .popcheck{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:13.5px}
  .popcheck:hover{background:var(--gray)}

  /* Purchase list */
  .plist{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .plist-head,.prow{display:grid;grid-template-columns:2.4fr 1fr .9fr .9fr 1.5fr 1fr 42px;gap:10px;align-items:center;padding:13px 18px}
  .plist-head{background:var(--gray);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .prow{border-bottom:1px solid var(--border);transition:background .12s}
  .prow:last-child{border-bottom:none}
  .prow:hover{background:var(--gray)}
  .group-bar{display:flex;align-items:center;gap:9px;padding:11px 18px;background:#fbfaf6;border-bottom:1px solid var(--border);color:var(--primary);font-weight:700;font-size:15px}
  .group-bar .ti{color:var(--primary);font-size:20px}
  .item-name2{font-weight:600;font-size:14px}
  .sku{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:1px}
  .stockbadge{font-family:var(--mono);font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px;display:inline-block}
  .stockbadge.low{background:var(--danger-soft);color:var(--danger)}
  .stockbadge.ok{background:var(--gray);color:var(--ink)}
  .ideal{color:var(--muted);font-family:var(--mono);font-size:13px}
  .tag{font-family:var(--mono);font-size:11px;color:var(--ink);background:var(--gray);border:1px solid var(--border);padding:3px 9px;border-radius:999px;display:inline-block}
  .pstep{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;height:38px;max-width:138px;width:100%;background:#fff}
  .pstep:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .pstep button{width:38px;align-self:stretch;background:var(--gray);display:flex;align-items:center;justify-content:center;color:var(--ink);transition:background .12s}
  .pstep button:hover{background:#ebe9e1;color:var(--primary)}
  .pstep input{flex:1;width:100%;min-width:0;border:none;text-align:center;font-family:var(--mono);font-weight:700;font-size:14px;outline:none;background:transparent}
  .cost{font-family:var(--mono);font-weight:600;font-size:13.5px}
  .rowdel{width:32px;height:32px;border-radius:7px;color:var(--muted);display:flex;align-items:center;justify-content:center;justify-self:end;transition:all .12s}
  .rowdel:hover{color:var(--danger);background:var(--danger-soft)}
  .empty{padding:50px 24px;text-align:center;color:var(--muted)}
  .empty .ti{font-size:38px;color:var(--border);margin-bottom:10px}
  .empty h4{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px}

  /* Quote cards (step 2) */
  .qcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
  .qcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column}
  .qcard h3{font-size:17px;font-weight:700}
  .qsub{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
  .qitems{background:var(--gray);border:1px solid var(--border);border-radius:8px;padding:6px 12px;max-height:140px;overflow-y:auto}
  .qitem{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
  .qitem:last-child{border-bottom:none}
  .qitem .qn{font-size:13.5px}
  .qitem .qq{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .supl{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .suprow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 11px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .12s}
  .suprow:hover{background:var(--gray)}
  .suprow.sel{border-color:var(--primary);background:var(--primary-soft)}
  .supinfo .sn{font-size:13.5px;font-weight:600}
  .supinfo .se{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:1px}
  .cbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 22px;transition:all .12s;color:#fff}
  .suprow.sel .cbox{background:var(--primary);border-color:var(--primary)}
  .cbox .ti{font-size:15px;opacity:0}
  .suprow.sel .cbox .ti{opacity:1}

  /* Action bar */
  .actionbar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);padding:15px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 -4px 14px -10px rgba(0,0,0,.18);z-index:20;flex-wrap:wrap}
  .totalwrap .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .totalwrap .val{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--primary);line-height:1.15}
  .totalwrap .sub{font-family:var(--mono);font-size:11px;color:var(--muted)}

  /* Success (step 3) */
  .success{flex:1;display:flex;align-items:center;justify-content:center;padding:44px 24px;min-height:440px}
  .success-inner{max-width:560px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;animation:fadeup .45s ease}
  .success-ico{width:88px;height:88px;border-radius:50%;background:var(--success-soft);display:flex;align-items:center;justify-content:center;margin-bottom:22px}
  .success-ico .ti{font-size:46px;color:var(--success)}
  .success h2{font-size:26px;font-weight:700;margin-bottom:10px}
  .success .lead{color:var(--muted);font-size:15px;max-width:440px;margin-bottom:26px;line-height:1.55}
  .summary{width:100%;background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;display:flex;align-items:center;gap:14px;text-align:left;margin-bottom:26px}
  .summary .si{width:48px;height:48px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex:0 0 48px}
  .summary .sl{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .summary .st{font-size:14px;line-height:1.45}
  .summary .st b{color:var(--primary)}
  .success-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

  /* Modal */
  .overlay{position:absolute;inset:0;background:rgba(35,35,35,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fade .15s ease}
  .modal{background:#fff;border-radius:14px;max-width:440px;width:100%;padding:24px;box-shadow:0 24px 60px -20px rgba(0,0,0,.4);animation:pop .18s ease}
  .modal h3{font-size:18px;font-weight:700;margin-bottom:16px}
  .ff{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .ff label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.03em}
  .ff input,.ff select{width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--ink);font-family:var(--sans);outline:none;transition:border .15s,box-shadow .15s}
  .ff input:focus,.ff select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .ff.err input{border-color:var(--danger);box-shadow:0 0 0 3px var(--danger-soft)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

  /* Toasts */
  .toasts{position:absolute;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:80}
  .toast{background:#fff;border:1px solid var(--border);border-left:4px solid var(--success);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:11px;box-shadow:0 12px 30px -12px rgba(0,0,0,.25);min-width:260px;max-width:360px;animation:slidein .22s ease}
  .toast.info{border-left-color:var(--primary)}
  .toast.warn{border-left-color:var(--amber)}
  .toast .ti{font-size:20px}
  .toast.success .ti{color:var(--success)} .toast.info .ti{color:var(--primary)} .toast.warn .ti{color:var(--amber)}
  .toast .t-txt{font-size:13.5px;font-weight:500;line-height:1.35}
  .toast.leaving{animation:slideout .2s ease forwards}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1)}}
  @keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideout{to{opacity:0;transform:translateX(20px)}}
  @keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  @media (max-width:920px){
    .sidebar{display:none}
    .plist-head{display:none}
    .prow{grid-template-columns:1fr 1fr;row-gap:6px}
  }
</style>
</head>

  function hydrateIcons(root){
    var scope = root || document;
    var list = scope.querySelectorAll('i.ti');
    Array.prototype.forEach.call(list, function(el){
      if(el.getAttribute('data-hi')) return;
      var name=null, cls=(el.className||'').split(/\s+/);
      for(var i=0;i<cls.length;i++){ if(cls[i]!=='ti' && cls[i].indexOf('ti-')===0){ name=cls[i].slice(3); break; } }
      if(name && ICONS[name]) el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICONS[name]+'</svg>';
      el.setAttribute('data-hi','1');
    });
  }

  function brl(n){
    var s=n.toFixed(2).split('.');
    return 'R$ '+s[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.')+','+s[1];
  }

  /* ---------- Data ---------- */
  var GROUPS = {
    "Secos":{icon:"wheat"},
    "Laticínios":{icon:"droplet"},
    "Hortifruti":{icon:"apple"}
  };
  var state = {};
  function initData(){
    state = {
      step:1,
      hidden:{},
      filterOpen:false,
      list:[
        {id:"p1", name:"Farinha de Trigo Premium", sku:"DG-1024", cat:"Secos", tag:"Secos", atual:12, unit:"kg", ideal:50, sug:40, price:3.00},
        {id:"p2", name:"Arroz Jasmine",            sku:"DG-2041", cat:"Secos", tag:"Secos", atual:45, unit:"kg", ideal:100, sug:55, price:3.00},
        {id:"p3", name:"Leite Integral",           sku:"DA-8821", cat:"Laticínios", tag:"Refrigerado", atual:4, unit:"L", ideal:40, sug:36, price:1.50}
      ],
      cats:[
        {name:"Laticínios", items:[["Leite Integral (1L)","12 un"],["Queijo Muçarela","5 kg"],["Manteiga sem sal","2 kg"],["Creme de Leite","10 un"]],
         suppliers:[{name:"Laticínios Vale", note:"R$ 485,00 (est.)", est:485, sel:true},{name:"Fazenda Bela Vista", note:"Sem estimativa", est:null, sel:false}]},
        {name:"Grãos e Mercearia", items:[["Café Especial Torrado","10 kg"],["Açúcar Refinado","20 kg"],["Cacau em Pó 100%","3 kg"]],
         suppliers:[{name:"Distribuidora Grãos de Ouro", note:"R$ 1.250,00 (est.)", est:1250, sel:true},{name:"Atacadista Central", note:"Última compra: 30 dias atrás", est:null, sel:true}]},
        {name:"Hortifruti", items:[["Laranja Pera","15 kg"],["Limão Tahiti","5 kg"],["Morango (Bandeja)","10 un"],["Hortelã (Maço)","5 un"]],
         suppliers:[{name:"Hortifruti Central", note:"R$ 210,00 (est.)", est:210, sel:false},{name:"Ceasa Distribuição", note:"Melhor preço na região", est:null, sel:true}]}
      ]
    };
  }

  function listTotal(){ return state.list.reduce(function(t,i){return t+i.sug*i.price;},0); }
  function quoteTotal(){ var t=0; state.cats.forEach(function(c){c.suppliers.forEach(function(s){ if(s.sel && s.est) t+=s.est; });}); return t; }
  function selSuppliers(){ var n=0; state.cats.forEach(function(c){c.suppliers.forEach(function(s){ if(s.sel) n++; });}); return n; }
  function catsWithSel(){ return state.cats.filter(function(c){return c.suppliers.some(function(s){return s.sel;});}).length; }

  /* ---------- Header + steps ---------- */
  function stepsHtml(){
    var def=[["1","Lista de compras"],["2","Cotações"],["3","Envio"]];
    var h='<div class="steps">';
    def.forEach(function(d,i){
      var n=i+1, cls = state.step===n?"active":(state.step>n?"done":"");
      var inner = state.step>n ? '<i class="ti ti-check"></i>' : d[0];
      h+='<div class="stepitem '+cls+'"><span class="stepnum">'+inner+'</span><span class="steplabel">'+d[1]+'</span></div>';
      if(i<2) h+='<span class="stepline"></span>';
    });
    return h+'</div>';
  }

  /* ---------- Render router ---------- */
  function render(){
    if(state.step===1) renderList();
    else if(state.step===2) renderQuotes();
    else renderSuccess();
    hydrateIcons(document);
  }

  /* ---------- Step 1: purchase list ---------- */
  function renderList(){
    var groups = {};
    state.list.forEach(function(it){ (groups[it.cat]=groups[it.cat]||[]).push(it); });
    var order = Object.keys(GROUPS).filter(function(g){return groups[g] && !state.hidden[g];});
    Object.keys(groups).forEach(function(g){ if(order.indexOf(g)===-1 && !state.hidden[g]) order.push(g); });

    var body='';
    if(order.length===0){
      body='<div class="empty"><i class="ti ti-search-off"></i><h4>Nenhum item na lista</h4><p>Adicione um item manualmente ou ajuste os filtros.</p></div>';
    } else {
      body='<div class="plist-head"><div>Item</div><div>Categoria</div><div class="r">Estoque atual</div><div class="r">Estoque ideal</div><div class="c">Sugestão de compra</div><div class="r">Custo est.</div><div></div></div>';
      order.forEach(function(g){
        var meta=GROUPS[g]||{icon:"package"};
        body+='<div class="group-bar"><i class="ti ti-'+meta.icon+'"></i>'+g+'</div>';
        groups[g].forEach(function(it){
          var low = it.atual <= it.ideal*0.3;
          body+='<div class="prow" data-id="'+it.id+'">'+
            '<div><div class="item-name2">'+it.name+'</div><div class="sku">SKU: '+it.sku+'</div></div>'+
            '<div><span class="tag">'+it.tag+'</span></div>'+
            '<div class="r"><span class="stockbadge '+(low?'low':'ok')+'">'+it.atual+' '+it.unit+'</span></div>'+
            '<div class="r ideal">'+it.ideal+' '+it.unit+'</div>'+
            '<div class="c"><div class="pstep"><button data-d="-1"><i class="ti ti-minus"></i></button>'+
              '<input type="text" inputmode="numeric" value="'+it.sug+'"><button data-d="1"><i class="ti ti-plus"></i></button></div></div>'+
            '<div class="r cost">'+brl(it.sug*it.price)+'</div>'+
            '<button class="rowdel" data-del="'+it.id+'" title="Remover"><i class="ti ti-trash"></i></button>'+
          '</div>';
        });
      });
    }

    $("#page").innerHTML =
      '<div class="page-head"><div>'+
        '<h2>Planejamento de Compras</h2>'+
        '<p>Lista recomendada a partir de dados de estoque e demanda em tempo real.</p>'+
        stepsHtml()+
      '</div><div class="head-actions">'+
        '<button class="btn btn-primary" id="add-item"><i class="ti ti-plus"></i>Adicionar item</button>'+
        '<button class="btn btn-outline" id="filter-btn"><i class="ti ti-filter"></i>Filtrar</button>'+
        '<button class="btn btn-outline" id="export-btn"><i class="ti ti-download"></i>Exportar</button>'+
        (state.filterOpen?filterPopover():'')+
      '</div></div>'+
      '<div class="plist">'+body+'</div>';

    $("#bar").innerHTML =
      '<div class="actionbar"><div class="totalwrap"><div class="lbl">Custo total estimado</div>'+
      '<div class="val">'+brl(listTotal())+'</div></div>'+
      '<button class="btn btn-primary btn-lg" id="go-quotes" '+(state.list.length?'':'disabled')+'>Prosseguir para cotações <i class="ti ti-arrow-right"></i></button></div>';

    bindList();
  }

  function filterPopover(){
    var h='<div class="popover" id="popover"><h5>Mostrar categorias</h5>';
    Object.keys(GROUPS).forEach(function(g){
      var on = !state.hidden[g];
      h+='<label class="popcheck"><span class="cbox '+(on?'sel':'')+'" style="'+(on?'background:var(--primary);border-color:var(--primary)':'')+'"><i class="ti ti-check" style="opacity:'+(on?1:0)+'"></i></span>'+g+'<input type="checkbox" data-fcat="'+g+'" '+(on?'checked':'')+' style="display:none"></label>';
    });
    return h+'</div>';
  }

  function bindList(){
    $("#add-item").onclick = openAddModal;
    $("#export-btn").onclick = function(){ toast("Lista exportada em CSV.", "info"); };
    $("#filter-btn").onclick = function(e){ e.stopPropagation(); state.filterOpen=!state.filterOpen; render(); };
    var pop=$("#popover");
    if(pop){
      pop.addEventListener("click", function(e){ e.stopPropagation(); });
      pop.querySelectorAll("[data-fcat]").forEach(function(c){
        c.addEventListener("change", function(){ var g=c.getAttribute("data-fcat"); if(c.checked) delete state.hidden[g]; else state.hidden[g]=true; render(); });
      });
    }
    var goq=$("#go-quotes"); if(goq) goq.onclick=function(){ state.step=2; scrollTop(); render(); };

    document.querySelectorAll(".prow").forEach(function(row){
      var id=row.getAttribute("data-id");
      var it=state.list.filter(function(x){return x.id===id;})[0];
      var input=$("input",row);
      row.querySelectorAll("[data-d]").forEach(function(b){
        b.onclick=function(){ it.sug=Math.max(0, it.sug+parseInt(b.getAttribute("data-d"),10)); render(); };
      });
      if(input) input.addEventListener("change", function(){ var v=parseInt(input.value,10); it.sug=isNaN(v)||v<0?0:v; render(); });
    });
    document.querySelectorAll("[data-del]").forEach(function(b){
      b.onclick=function(){ var id=b.getAttribute("data-del"); var it=state.list.filter(function(x){return x.id===id;})[0];
        state.list=state.list.filter(function(x){return x.id!==id;}); render(); toast((it?it.name:'Item')+" removido da lista.", "warn"); };
    });
  }

  function openAddModal(){
    $("#modal-root").innerHTML =
      '<div class="overlay" id="ovl"><div class="modal">'+
        '<h3>Adicionar item à lista</h3>'+
        '<div class="ff" id="ff-n"><label>Nome do insumo</label><input id="m-name" type="text" placeholder="Ex.: Manteiga sem sal"></div>'+
        '<div class="grid2">'+
          '<div class="ff"><label>Categoria</label><select id="m-cat"><option>Secos</option><option>Laticínios</option><option>Hortifruti</option></select></div>'+
          '<div class="ff"><label>Unidade</label><select id="m-unit"><option>kg</option><option>un</option><option>L</option><option>pct</option></select></div>'+
          '<div class="ff"><label>Sugestão de compra</label><input id="m-sug" type="number" min="0" value="10"></div>'+
          '<div class="ff"><label>Preço unitário (R$)</label><input id="m-price" type="text" placeholder="0,00"></div>'+
        '</div>'+
        '<div class="modal-foot"><button class="btn btn-outline" id="m-cancel">Cancelar</button>'+
        '<button class="btn btn-primary" id="m-save"><i class="ti ti-plus"></i>Adicionar</button></div>'+
      '</div></div>';
    hydrateIcons($("#modal-root"));
    var close=function(){ $("#modal-root").innerHTML=""; };
    $("#m-cancel").onclick=close;
    $("#ovl").onclick=function(e){ if(e.target.id==="ovl") close(); };
    $("#m-save").onclick=function(){
      var name=$("#m-name").value.trim();
      if(!name){ $("#ff-n").classList.add("err"); $("#m-name").focus(); return; }
      var cat=$("#m-cat").value;
      var price=parseFloat(($("#m-price").value||"0").replace(/\./g,"").replace(",","."))||0;
      var sug=parseInt($("#m-sug").value,10)||0;
      state.list.push({id:"p"+Date.now(), name:name, sku:"NV-"+(Math.floor(Math.random()*900)+100), cat:cat,
        tag: cat==="Laticínios"?"Refrigerado":cat, atual:0, unit:$("#m-unit").value, ideal:sug, sug:sug, price:price});
      if(state.hidden[cat]) delete state.hidden[cat];
      close(); render(); toast(name+" adicionado à lista.", "success");
    };
  }

  /* ---------- Step 2: quotes ---------- */
  function renderQuotes(){
    var cards = state.cats.map(function(c,ci){
      var items = c.items.map(function(it){
        return '<div class="qitem"><span class="qn">'+it[0]+'</span><span class="qq">'+it[1]+'</span></div>';
      }).join("");
      var sups = c.suppliers.map(function(s,si){
        return '<div class="suprow '+(s.sel?'sel':'')+'" data-c="'+ci+'" data-s="'+si+'">'+
          '<div class="supinfo"><div class="sn">'+s.name+'</div><div class="se">'+s.note+'</div></div>'+
          '<span class="cbox"><i class="ti ti-check"></i></span></div>';
      }).join("");
      return '<div class="qcard"><h3>'+c.name+'</h3>'+
        '<div class="qsub">Itens solicitados ('+c.items.length+')</div>'+
        '<div class="qitems">'+items+'</div>'+
        '<div class="qsub">Fornecedores</div>'+
        '<div class="supl">'+sups+'</div></div>';
    }).join("");

    $("#page").innerHTML =
      '<div class="page-head"><div>'+
        '<h2>Seleção de Fornecedores e Cotações</h2>'+
        '<p>Os itens foram organizados por categoria. Selecione os fornecedores que receberão a solicitação de cotação.</p>'+
        stepsHtml()+
      '</div></div><div class="qcards">'+cards+'</div>';

    renderQuoteBar();
    document.querySelectorAll(".suprow").forEach(function(row){
      row.onclick=function(){ var c=+row.getAttribute("data-c"), s=+row.getAttribute("data-s");
        state.cats[c].suppliers[s].sel=!state.cats[c].suppliers[s].sel; render(); };
    });
  }

  function renderQuoteBar(){
    var n=selSuppliers();
    $("#bar").innerHTML =
      '<div class="actionbar"><div class="totalwrap"><div class="lbl">Total estimado para comparação</div>'+
        '<div class="val">'+brl(quoteTotal())+'</div>'+
        '<div class="sub">'+n+' fornecedor'+(n===1?'':'es')+' selecionado'+(n===1?'':'s')+'</div></div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
        '<button class="btn btn-outline btn-lg" id="back-plan"><i class="ti ti-arrow-left"></i>Voltar ao planejamento</button>'+
        '<button class="btn btn-primary btn-lg" id="send-q" '+(n?'':'disabled')+'><i class="ti ti-send"></i>Enviar solicitações</button>'+
      '</div></div>';
    $("#back-plan").onclick=function(){ state.step=1; scrollTop(); render(); };
    var sq=$("#send-q"); if(sq && !sq.disabled) sq.onclick=function(){ state.step=3; scrollTop(); render(); };
  }

  /* ---------- Step 3: success ---------- */
  function renderSuccess(){
    var cs=catsWithSel(), ss=selSuppliers();
    $("#page").innerHTML =
      '<div class="success"><div class="success-inner">'+
        '<div class="success-ico"><i class="ti ti-circle-check"></i></div>'+
        '<h2>Solicitações enviadas com sucesso!</h2>'+
        '<p class="lead">Os fornecedores selecionados receberam sua lista e entrarão em contato com as propostas em breve.</p>'+
        '<div class="summary"><div class="si"><i class="ti ti-list-details"></i></div>'+
          '<div><div class="sl">Resumo do envio</div>'+
          '<div class="st"><b>'+cs+'</b> categoria'+(cs===1?'':'s')+' de insumos enviada'+(cs===1?'':'s')+' para <b>'+ss+'</b> fornecedor'+(ss===1?'':'es')+' diferente'+(ss===1?'':'s')+'.</div></div></div>'+
        '<div class="success-actions">'+
          '<button class="btn btn-primary btn-lg" id="track"><i class="ti ti-inbox"></i>Acompanhar respostas</button>'+
          '<button class="btn btn-outline btn-lg" id="dash"><i class="ti ti-layout-dashboard"></i>Ir para o painel</button>'+
          '<button class="btn btn-outline btn-lg" id="newplan"><i class="ti ti-circle-plus"></i>Novo planejamento</button>'+
        '</div>'+
      '</div></div>';
    $("#bar").innerHTML="";
    $("#track").onclick=function(){ window.location.href="pedidos.html"; };
    $("#dash").onclick=function(){ window.location.href="index.html"; };
    $("#newplan").onclick=function(){ initData(); scrollTop(); render(); toast("Novo planejamento iniciado.", "success"); };
  }

  /* ---------- Toasts + utils ---------- */
  function toast(msg, type){
    type=type||"success";
    var ico=type==="success"?"circle-check":type==="warn"?"alert-triangle":"info-circle";
    var el=document.createElement("div");
    el.className="toast "+type;
    el.innerHTML='<i class="ti ti-'+ico+'"></i><span class="t-txt">'+msg+'</span>';
    $("#toasts").appendChild(el); hydrateIcons(el);
    setTimeout(function(){ el.classList.add("leaving"); setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },200); }, 2600);
  }
  function scrollTop(){ var s=$("#scroll"); if(s) s.scrollTop=0; }

  document.addEventListener("click", function(){ if(state.filterOpen){ state.filterOpen=false; if(state.step===1) render(); } });
  document.addEventListener("click", function(e){
    var go=e.target.closest && e.target.closest("[data-href]");
    if(go){ window.location.href=go.getAttribute("data-href"); return; }
    var nav=e.target.closest && e.target.closest("[data-nav]");
    if(nav){ toast('"'+nav.getAttribute("data-nav")+'" faz parte de outro fluxo do protótipo.', "info"); }
  });

  initData();
  render();
})();
</script>
</body>
</html>
